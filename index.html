<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>おしんこ屋さん</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap');

  :root {
    --bg-dark: #1a1410;
    --bg-mid: #2d1f17;
    --paper: #f4e8d0;
    --paper-dark: #d4b896;
    --ink: #2d1f17;
    --red: #c43d3d;
    --red-dark: #8b2828;
    --green: #5a7a3a;
    --green-dark: #3d5526;
    --gold: #d4a04c;
    --gold-dark: #8b6420;
    --shadow: #00000080;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-dark);
    font-family: 'DotGothic16', monospace;
    color: var(--ink);
    image-rendering: pixelated;
    -webkit-font-smoothing: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: manipulation;
  }

  /* 背景の和風パターン */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(45deg, transparent 0 8px, #00000010 8px 9px),
      repeating-linear-gradient(-45deg, transparent 0 8px, #00000010 8px 9px),
      linear-gradient(180deg, #2d1f17 0%, #1a1410 100%);
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    width: 100%;
    /* iPhone Safari動的ビューポート対応: dvhが効かない環境は100%にフォールバック */
    height: 100dvh;
    max-height: 100dvh;
    max-width: 500px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    background: var(--paper);
    border: 4px solid var(--ink);
    box-shadow: 0 0 0 2px var(--gold), inset 0 0 60px #00000020;
    /* iOSのセーフエリアを考慮 */
    padding-top: env(safe-area-inset-top, 0);
    padding-bottom: env(safe-area-inset-bottom, 0);
    box-sizing: border-box;
  }

  /* dvhが効かない古いブラウザ用の保険 */
  @supports not (height: 100dvh) {
    #app { height: 100vh; max-height: 100vh; }
  }

  /* ヘッダー(屋号と日付) */
  .header {
    background: var(--ink);
    color: var(--paper);
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 4px double var(--gold);
    flex-shrink: 0;
  }

  .shop-name {
    font-size: 14px;
    letter-spacing: 2px;
    color: var(--gold);
    text-shadow: 2px 2px 0 #000;
  }

  .shop-name::before { content: '【 '; color: var(--paper); }
  .shop-name::after { content: ' 】'; color: var(--paper); }

  .stats {
    font-size: 11px;
    text-align: right;
    line-height: 1.4;
  }

  .stats .money { color: var(--gold); }

  /* ヘッダーの引退ボタン(常設) */
  .header-retire-btn {
    background: #8b3a3a;
    color: var(--paper);
    border: 2px solid var(--gold);
    margin-left: 8px;
    padding: 6px 8px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 3px;
    box-shadow: 2px 2px 0 #000;
    flex-shrink: 0;
  }
  .header-retire-btn:active {
    transform: translate(1px, 1px);
    box-shadow: 1px 1px 0 #000;
  }
  .header-retire-btn .retire-label {
    font-size: 10px;
    letter-spacing: 1px;
  }
  .header-retire-btn.hidden { display: none !important; }

  /* ヘッダーのタイトル戻りボタン */
  .header-home-btn {
    background: var(--green-dark);
    color: var(--paper);
    border: 2px solid var(--gold);
    margin-left: 4px;
    padding: 6px 8px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    box-shadow: 2px 2px 0 #000;
    flex-shrink: 0;
  }
  .header-home-btn:active {
    transform: translate(1px, 1px);
    box-shadow: 1px 1px 0 #000;
  }
  .header-home-btn.hidden { display: none !important; }
  .stats .day { color: var(--paper); }

  /* メイン領域 */
  .main {
    flex: 1 1 auto;
    min-height: 0;  /* flex子要素のはみ出し防止(iPhone対策) */
    overflow-y: auto;
    -webkit-overflow-scrolling: touch; /* iOSスムーススクロール */
    padding: 10px;
    background:
      repeating-linear-gradient(0deg, transparent 0 24px, #8b642010 24px 25px),
      var(--paper);
  }

  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: var(--paper-dark); }
  .main::-webkit-scrollbar-thumb { background: var(--ink); }

  /* 季節・天気バナー */
  .season-banner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--ink);
    color: var(--paper);
    padding: 6px 10px;
    margin-bottom: 10px;
    font-size: 11px;
    border: 2px solid var(--gold-dark);
  }

  .season-banner .reputation {
    color: var(--gold);
  }

  /* 週バナー(目標進捗付き) */
  .week-banner {
    background: var(--ink);
    color: var(--paper);
    padding: 8px 10px;
    margin-bottom: 10px;
    font-size: 11px;
    border: 2px solid var(--gold);
    box-shadow: 2px 2px 0 #000;
  }
  .week-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .week-top .reputation { color: var(--gold); font-size: 11px; }
  .goal-bar-wrap { font-size: 10px; }
  .goal-label {
    color: var(--paper);
    margin-bottom: 3px;
    font-size: 11px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .goal-label .goal-current { color: var(--gold); font-weight: bold; font-size: 13px; }
  .goal-label .goal-target { color: var(--paper-dark); }
  .goal-label .goal-remain {
    background: var(--red-dark);
    color: var(--paper);
    padding: 1px 6px;
    font-size: 10px;
    border: 1px solid var(--gold);
  }
  .goal-label .goal-remain.cleared {
    background: var(--green);
  }
  .goal-bar {
    height: 12px;
    background: var(--bg-mid);
    border: 1px solid var(--gold-dark);
    overflow: hidden;
    position: relative;
  }
  .goal-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green) 0%, var(--gold) 70%, var(--red) 100%);
    transition: width 0.5s;
    position: relative;
  }
  .goal-bar.cleared .goal-bar-fill {
    background: var(--green);
    animation: pulse-clear 1.5s infinite;
  }
  @keyframes pulse-clear {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  .goal-bar-mark {
    position: absolute;
    right: 4px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 10px;
    color: var(--paper);
    text-shadow: 1px 1px 0 #000;
  }

  /* タップ展開可能カード(おしんこ帳など) */
  .recipe-collapsible {
    cursor: pointer;
    transition: all 0.1s;
  }
  .recipe-collapsible:active {
    transform: translate(1px, 1px);
    box-shadow: 1px 1px 0 var(--ink);
  }

  /* モーダル内のレシピリスト */
  .recipe-list-modal {
    padding: 4px;
    max-height: 60vh;
    overflow-y: auto;
  }
  .recipe-section-title {
    background: var(--ink);
    color: var(--gold);
    padding: 4px 8px;
    font-size: 11px;
    margin: 8px 0 4px;
    border: 1px solid var(--gold);
    letter-spacing: 2px;
  }

  /* 加工品セクション */
  .dish-section {
    background: linear-gradient(180deg, #f4e8a8 0%, #e8c878 100%);
    border: 3px solid var(--red-dark);
    padding: 10px;
    margin-top: 12px;
    box-shadow: 3px 3px 0 var(--ink);
    position: relative;
  }
  .dish-section-title {
    background: var(--red-dark);
    color: var(--paper);
    padding: 6px 10px;
    font-size: 13px;
    letter-spacing: 2px;
    margin: -10px -10px 8px;
    text-align: center;
    border-bottom: 2px solid var(--ink);
  }
  .dish-section-desc {
    font-size: 10px;
    color: var(--ink);
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .dish-recipe-row, .dish-stock-row {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--paper);
    border: 1px solid var(--ink);
    padding: 6px;
    margin: 4px 0;
    font-size: 11px;
  }
  .dish-recipe-row.can-make {
    background: #fff8d8;
    border: 2px solid var(--gold);
  }
  .dish-recipe-row.cannot-make {
    opacity: 0.7;
  }
  .dish-icon {
    font-size: 22px;
    width: 32px;
    text-align: center;
  }
  .dish-info { flex: 1; min-width: 0; }
  .dish-name {
    font-size: 11px;
    font-weight: bold;
    color: var(--red-dark);
  }
  .dish-price-tag {
    background: var(--red);
    color: var(--paper);
    font-size: 10px;
    padding: 1px 5px;
    margin-left: 4px;
    border: 1px solid var(--ink);
  }
  .dish-desc {
    font-size: 10px;
    color: var(--green-dark);
  }
  .dish-price {
    color: var(--red-dark);
    font-weight: bold;
    font-size: 12px;
  }
  .dish-stock-title {
    background: var(--green-dark);
    color: var(--paper);
    padding: 3px 8px;
    margin-top: 8px;
    font-size: 11px;
    border: 1px solid var(--ink);
  }

  /* 加工品ステータスバー */
  .dish-status-bar {
    background: var(--ink);
    color: var(--paper);
    padding: 4px 8px;
    font-size: 10px;
    margin-bottom: 8px;
    border: 1px solid var(--gold);
  }
  .dish-full-warn {
    background: var(--red);
    color: var(--paper);
    padding: 1px 5px;
    margin-left: 4px;
    font-size: 9px;
  }

  /* 加工品在庫行のクリッカブル+店頭/倉庫の見た目 */
  .dish-stock-row {
    cursor: pointer;
    position: relative;
  }
  .dish-stock-row.on-display {
    background: #fff8d8;
    border: 2px solid var(--gold);
  }
  .dish-stock-row.in-stock {
    background: var(--paper-dark);
    opacity: 0.8;
  }
  .dish-display-tag {
    font-size: 9px;
    padding: 2px 5px;
    border: 1px solid var(--ink);
    background: var(--paper);
    margin-left: 4px;
  }
  .dish-discard-btn {
    background: var(--red);
    color: var(--paper);
    font-size: 10px;
    width: 18px;
    height: 18px;
    line-height: 17px;
    text-align: center;
    border: 1px solid var(--ink);
    margin-left: 6px;
    display: inline-block;
    cursor: pointer;
  }

  /* 看板娘の小さなアイコン(店内) */
  .girls-strip {
    display: flex;
    gap: 6px;
    background: var(--paper-dark);
    border: 2px solid var(--ink);
    padding: 6px;
    margin-bottom: 8px;
    align-items: center;
  }
  .girl-icon {
    width: 36px;
    height: 36px;
    image-rendering: pixelated;
    border: 1px solid var(--ink);
    background: var(--paper);
    object-fit: cover; /* imgでも収まるように */
  }
  .girl-icon-info {
    flex: 1;
    font-size: 10px;
    line-height: 1.4;
  }
  .girl-icon-info .girl-name { color: var(--red-dark); font-weight: bold; font-size: 11px; }

  /* レシピ帳 */
  .recipe-list {
    margin-top: 8px;
  }
  .recipe-card {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 6px 8px;
    margin-bottom: 4px;
    font-size: 10px;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .recipe-card .recipe-icon {
    font-size: 18px;
    flex-shrink: 0;
  }
  .recipe-card .recipe-name { color: var(--red-dark); font-weight: bold; font-size: 11px; }
  .recipe-card.unlocked { background: #f8e890; }
  .recipe-card.locked { opacity: 0.5; }

  /* 章クリアスクリーン */
  .chapter-clear {
    text-align: center;
    padding: 20px;
  }
  .chapter-clear h2 {
    color: var(--red-dark);
    font-size: 22px;
    letter-spacing: 4px;
    margin: 10px 0;
    text-shadow: 2px 2px 0 var(--gold);
  }
  .chapter-clear .big-num {
    font-size: 28px;
    color: var(--gold-dark);
    margin: 8px 0;
    text-shadow: 2px 2px 0 var(--ink);
  }
  .star {
    display: inline-block;
    font-size: 20px;
    color: var(--gold);
    text-shadow: 2px 2px 0 var(--ink);
    animation: pop 0.4s ease-out;
  }
  @keyframes pop {
    0% { transform: scale(0); }
    70% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  /* 看板娘登場演出 */
  .girl-unlock {
    text-align: center;
    padding: 12px;
  }
  .girl-unlock canvas {
    width: 96px;
    height: 96px;
    image-rendering: pixelated;
    margin: 8px 0;
  }
  /* イラスト画像表示用(アンロックモーダル) */
  .girl-unlock .girl-illust {
    max-width: 220px;
    max-height: 260px;
    width: auto;
    height: auto;
    margin: 8px auto;
    display: block;
    border: 2px solid var(--ink);
    background: var(--paper);
    box-shadow: 4px 4px 0 var(--ink);
  }

  /* ストーリーイベント */
  .story-event {
    text-align: center;
    padding: 6px;
  }
  .story-event-img {
    max-width: 140px;
    max-height: 180px;
    margin: 6px auto;
    display: block;
    border: 2px solid var(--ink);
    background: var(--paper);
    box-shadow: 3px 3px 0 var(--ink);
  }
  .story-event-img + canvas, .story-event canvas {
    width: 80px;
    height: 80px;
    image-rendering: pixelated;
    margin: 6px auto;
    display: block;
  }
  .story-event-body {
    background: var(--paper);
    border: 1px solid var(--ink);
    padding: 10px 12px;
    margin: 8px 0;
    font-size: 12px;
    line-height: 1.7;
    text-align: left;
    color: var(--ink);
  }
  .story-event-effect {
    background: var(--gold);
    color: var(--ink);
    padding: 4px 8px;
    font-size: 10px;
    border: 1px solid var(--ink);
    display: inline-block;
    margin: 4px 0;
  }
  .story-event-closing {
    font-size: 10px;
    color: var(--green-dark);
    font-style: italic;
    margin-top: 8px;
  }

  /* エンディング画面 */
  .ending-screen {
    text-align: center;
    padding: 8px;
  }
  .ending-title {
    font-size: 18px;
    color: var(--red-dark);
    margin: 8px 0;
    letter-spacing: 2px;
    text-shadow: 2px 2px 0 var(--gold);
  }
  .ending-subtitle {
    font-size: 11px;
    color: var(--green-dark);
    margin-bottom: 12px;
  }
  .ending-body {
    background: var(--paper);
    border: 1px solid var(--ink);
    padding: 12px;
    font-size: 12px;
    line-height: 1.8;
    text-align: left;
    margin: 8px 0;
  }
  .ending-stats {
    background: var(--paper-dark);
    border: 1px solid var(--ink);
    padding: 8px;
    margin: 8px 0;
  }
  .ending-quote {
    color: var(--ink);
    font-style: italic;
    font-size: 12px;
    margin: 12px 0;
    padding: 6px;
    border-top: 1px dashed var(--ink);
    border-bottom: 1px dashed var(--ink);
  }
  .ending-route-label {
    background: var(--ink);
    color: var(--gold);
    font-size: 11px;
    padding: 4px 8px;
    display: inline-block;
    margin-top: 8px;
  }
  .girl-unlock .girl-title {
    color: var(--red-dark);
    font-size: 12px;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .girl-unlock .girl-fullname {
    font-size: 18px;
    color: var(--ink);
    margin: 4px 0;
  }
  .girl-unlock .girl-skill {
    background: var(--gold);
    color: var(--ink);
    padding: 4px 8px;
    font-size: 11px;
    border: 1px solid var(--ink);
    display: inline-block;
    margin: 6px 0;
  }

  /* スタミナ表示 */
  .stamina-bar {
    display: flex;
    gap: 3px;
    align-items: center;
    font-size: 10px;
  }

  /* 味属性チップ */
  .flavor-chip {
    display: inline-block;
    padding: 1px 5px;
    font-size: 9px;
    border: 1px solid var(--ink);
    margin-right: 2px;
    background: var(--paper);
  }
  .flavor-chip.flavor-辛口 { background: #e85a3a; color: var(--paper); }
  .flavor-chip.flavor-酸味 { background: #d4a04c; color: var(--ink); }
  .flavor-chip.flavor-甘味 { background: #e88aaa; color: var(--ink); }
  .flavor-chip.flavor-塩辛 { background: #6a86a8; color: var(--paper); }
  .flavor-chip.flavor-さっぱり { background: #88c8a0; color: var(--ink); }

  /* 樽の店頭/熟成状態 */
  .barrel.on-display {
    background: #fff4d0 !important;
    box-shadow: 0 0 0 2px var(--gold), 2px 2px 0 var(--ink);
  }
  .barrel.aging {
    background: var(--paper-dark);
  }
  .barrel-display-tag {
    position: absolute;
    top: 2px;
    right: 4px;
    font-size: 9px;
    color: var(--ink);
    background: var(--paper);
    border: 1px solid var(--ink);
    padding: 0 3px;
  }
  .barrel {
    cursor: pointer;
    position: relative;
  }
  .barrel-flavors {
    margin-top: 3px;
    min-height: 14px;
  }
  .stamina-dot {
    width: 10px;
    height: 10px;
    background: var(--red);
    border: 1px solid var(--ink);
  }
  .stamina-dot.used { background: var(--paper-dark); }

  /* 章報酬カード */
  .reward-card {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 10px;
    margin-bottom: 8px;
    display: flex;
    gap: 10px;
    align-items: center;
    cursor: pointer;
    transition: all 0.1s;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .reward-card:hover, .reward-card:active {
    background: var(--gold);
    transform: translate(1px, 1px);
    box-shadow: 2px 2px 0 var(--ink);
  }
  .reward-card .reward-icon {
    font-size: 28px;
    flex-shrink: 0;
  }
  .reward-card .reward-title {
    font-size: 13px;
    color: var(--red-dark);
    font-weight: bold;
    margin-bottom: 2px;
  }
  .reward-card .reward-desc {
    font-size: 10px;
    color: var(--ink);
    line-height: 1.4;
  }

  /* フェーズ表示 */
  .phase-title {
    background: var(--red-dark);
    color: var(--paper);
    padding: 8px;
    text-align: center;
    font-size: 13px;
    letter-spacing: 3px;
    margin-bottom: 10px;
    border: 2px solid var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
    position: relative;
  }

  .phase-title::before, .phase-title::after {
    content: '◆';
    color: var(--gold);
    margin: 0 8px;
  }

  /* カード共通 */
  .card {
    background: var(--paper-dark);
    border: 2px solid var(--ink);
    padding: 8px;
    margin-bottom: 8px;
    box-shadow: 3px 3px 0 #00000040;
    position: relative;
  }

  .card-title {
    font-size: 12px;
    color: var(--ink);
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px dashed var(--ink);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* 仕入れリスト */
  .item-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px;
    background: var(--paper);
    border: 1px solid var(--ink);
    margin-bottom: 4px;
    font-size: 11px;
  }

  .item-sprite {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
    image-rendering: pixelated;
  }

  .item-info {
    flex: 1;
    min-width: 0;
  }

  .item-name {
    font-size: 12px;
    margin-bottom: 2px;
  }

  .item-detail {
    font-size: 10px;
    color: var(--green-dark);
  }

  .item-detail .price {
    color: var(--red-dark);
    font-weight: bold;
  }

  /* ボタン */
  button {
    font-family: inherit;
    background: var(--gold);
    color: var(--ink);
    border: 2px solid var(--ink);
    padding: 6px 10px;
    font-size: 11px;
    cursor: pointer;
    box-shadow: 2px 2px 0 var(--ink);
    transition: all 0.05s;
    image-rendering: pixelated;
  }

  button:active:not(:disabled) {
    transform: translate(2px, 2px);
    box-shadow: 0 0 0 var(--ink);
  }

  button:disabled {
    background: var(--paper-dark);
    color: #888;
    cursor: not-allowed;
    box-shadow: 2px 2px 0 #555;
  }

  button.primary {
    background: var(--red);
    color: var(--paper);
  }

  button.green {
    background: var(--green);
    color: var(--paper);
  }

  /* 樽エリア */
  .barrels {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }

  .barrel {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 6px;
    font-size: 10px;
    position: relative;
    min-height: 80px;
  }

  .barrel.empty {
    color: #888;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    background: repeating-linear-gradient(45deg, var(--paper) 0 4px, var(--paper-dark) 4px 5px);
  }

  .barrel-header {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 4px;
  }

  .barrel .item-sprite {
    width: 24px;
    height: 24px;
  }

  .barrel-name {
    font-size: 11px;
    flex: 1;
  }

  .barrel-status {
    font-size: 9px;
    padding: 2px 4px;
    margin-top: 2px;
    text-align: center;
    border: 1px solid var(--ink);
  }

  .status-asa { background: #b8d870; }   /* 浅漬け */
  .status-good { background: var(--gold); } /* 食べごろ */
  .status-furu { background: #c89060; }  /* 古漬け */
  .status-bad { background: #6a3a3a; color: var(--paper); } /* 傷み */

  .barrel-days {
    font-size: 9px;
    color: var(--green-dark);
  }

  /* 販売フェーズ */
  .sell-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px;
    background: var(--paper);
    border: 1px solid var(--ink);
    margin-bottom: 4px;
    font-size: 10px;
  }

  .price-input {
    width: 55px;
    font-family: inherit;
    font-size: 11px;
    text-align: right;
    border: 2px solid var(--ink);
    background: var(--paper);
    padding: 3px;
  }

  .price-input:focus { outline: 2px solid var(--gold); }

  /* お客さん表示 */
  .customer-area {
    background: var(--ink);
    color: var(--paper);
    padding: 10px;
    border: 2px solid var(--gold);
    margin-bottom: 8px;
    min-height: 80px;
    position: relative;
  }

  .customer-sprite {
    width: 48px;
    height: 48px;
    float: left;
    margin-right: 10px;
    image-rendering: pixelated;
  }

  .customer-text {
    font-size: 11px;
    line-height: 1.6;
    min-height: 48px;
  }

  .customer-text .name {
    color: var(--gold);
    font-size: 12px;
    display: block;
    margin-bottom: 4px;
  }

  /* メッセージログ */
  .log {
    background: var(--ink);
    color: #b8d870;
    font-size: 10px;
    padding: 6px;
    height: 60px;
    overflow-y: auto;
    border: 2px solid var(--gold-dark);
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .log::-webkit-scrollbar { width: 4px; }
  .log::-webkit-scrollbar-thumb { background: var(--gold); }

  .log-entry { margin-bottom: 2px; }
  .log-entry .yen { color: var(--gold); }
  .log-entry .bad { color: #ff8080; }

  /* フッターのアクションボタン */
  .footer {
    flex-shrink: 0;
    padding: 8px;
    background: var(--ink);
    border-top: 4px double var(--gold);
    display: flex;
    gap: 8px;
  }

  .footer button {
    flex: 1;
    padding: 10px;
    font-size: 12px;
  }

  /* 閉店など破壊的アクション用の地味な小ボタン */
  .footer button.small-btn {
    flex: 0 0 auto;
    width: 44px;
    padding: 8px 4px;
    font-size: 14px;
    background: var(--bg-mid);
    color: var(--paper-dark);
  }
  .footer button.small-btn:active {
    background: var(--red-dark);
    color: var(--paper);
  }

  /* タイトル画面 */
  .title-screen {
    position: absolute;
    inset: 0;
    background: var(--ink);
    z-index: 100;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: var(--paper);
    padding: 20px;
    background-image:
      radial-gradient(circle at 50% 30%, #3d2818 0%, #1a1410 70%);
  }

  .title-logo {
    font-size: 28px;
    color: var(--gold);
    letter-spacing: 4px;
    text-align: center;
    margin-bottom: 8px;
    text-shadow: 3px 3px 0 var(--red-dark), 6px 6px 0 #000;
    animation: bounce 2s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  .title-sub {
    font-size: 10px;
    color: var(--paper-dark);
    letter-spacing: 6px;
    margin-bottom: 30px;
  }

  .title-author {
    font-size: 8px;
    color: #6a5a3a;
    letter-spacing: 1px;
    margin-bottom: 24px;
    text-align: center;
    font-family: monospace;
    opacity: 0.7;
  }

  /* オーナーの手帳(夜画面のフレーバー) */
  .owner-note {
    background: #f4e8a8;
    border: 1px solid var(--ink);
    border-left: 4px solid var(--green);
    padding: 6px 8px;
    margin-top: 8px;
    font-size: 10px;
    color: var(--ink);
    font-family: monospace;
    line-height: 1.6;
  }
  .owner-note .note-head {
    color: var(--green-dark);
    font-size: 9px;
    margin-bottom: 2px;
  }

  .title-tarus {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
  }

  .title-tarus canvas {
    width: 48px;
    height: 48px;
    image-rendering: pixelated;
  }

  .title-start {
    background: var(--red);
    color: var(--paper);
    border: 2px solid var(--gold);
    padding: 12px 30px;
    font-size: 14px;
    letter-spacing: 4px;
    cursor: pointer;
    animation: blink 1s steps(2) infinite;
    box-shadow: 4px 4px 0 #000;
  }

  .title-continue {
    background: var(--gold);
    color: var(--ink);
    border: 2px solid var(--paper);
    padding: 14px 30px;
    font-size: 14px;
    letter-spacing: 4px;
    cursor: pointer;
    box-shadow: 4px 4px 0 #000;
    font-family: inherit;
    display: block;
    margin: 0 auto;
  }
  .title-continue:active {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 #000;
  }

  #continue-area {
    text-align: center;
    margin-bottom: 20px;
  }
  .save-info {
    font-size: 9px;
    color: var(--paper-dark);
    margin-top: 6px;
    line-height: 1.5;
  }

  /* 新規ゲームの時のセーブ消去確認ヒント */
  #newgame-area.has-save label::after {
    content: ' (※新規開始で上書きされます)';
    font-size: 9px;
    color: var(--red);
    display: block;
    margin-top: 2px;
  }

  @keyframes blink {
    50% { opacity: 0.5; }
  }

  .title-credit {
    position: absolute;
    bottom: 20px;
    font-size: 9px;
    color: #666;
    letter-spacing: 2px;
  }

  /* 店主アイコンボタン(タイトル右下) */
  .owner-btn {
    position: absolute;
    bottom: 12px;
    right: 12px;
    width: 40px;
    height: 40px;
    font-size: 18px;
    background: transparent;
    color: var(--paper-dark);
    border: 1px solid var(--paper-dark);
    cursor: pointer;
    font-family: inherit;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .owner-btn:hover, .owner-btn:active {
    opacity: 1;
    color: var(--gold);
    border-color: var(--gold);
  }

  /* ランキングボタン(タイトル左下) */
  .ranking-btn {
    position: absolute;
    bottom: 12px;
    left: 12px;
    width: 40px;
    height: 40px;
    font-size: 18px;
    background: transparent;
    color: var(--paper-dark);
    border: 1px solid var(--paper-dark);
    cursor: pointer;
    font-family: inherit;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .ranking-btn:hover, .ranking-btn:active {
    opacity: 1;
    color: var(--gold);
    border-color: var(--gold);
  }

  /* ランキング表示 */
  .ranking-list { padding: 4px; }

  /* ランキングのタブ切替 */
  .ranking-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
  }
  .ranking-tab {
    flex: 1;
    background: var(--paper-dark);
    color: var(--ink);
    border: 2px solid var(--ink);
    padding: 6px 4px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
  }
  .ranking-tab.active {
    background: var(--ink);
    color: var(--gold);
    border-color: var(--gold);
  }
  .ranking-tab:active {
    transform: translate(1px, 1px);
  }
  .ranking-entry {
    display: grid;
    grid-template-columns: 32px 1fr auto;
    gap: 8px;
    align-items: center;
    padding: 6px;
    border: 1px solid var(--ink);
    margin-bottom: 4px;
    background: var(--paper);
    font-size: 11px;
  }
  .ranking-entry.first { background: var(--gold); }
  .ranking-entry.second { background: #d8d8d8; }
  .ranking-entry.third { background: #c8a878; }
  .rank-num {
    font-size: 16px;
    text-align: center;
    color: var(--red-dark);
    font-weight: bold;
  }
  .rank-info { line-height: 1.4; }
  .rank-info .shop { font-weight: bold; color: var(--ink); }
  .rank-info .meta { font-size: 9px; color: var(--green-dark); }
  .rank-revenue { color: var(--red-dark); font-weight: bold; }

  .ranking-result {
    background: var(--gold);
    color: var(--ink);
    padding: 6px 10px;
    margin: 10px auto;
    font-size: 13px;
    border: 2px solid var(--ink);
    display: inline-block;
    box-shadow: 2px 2px 0 var(--ink);
    font-weight: bold;
  }

  /* 店主紹介画面 */
  .owner-profile {
    text-align: center;
    padding: 4px;
  }
  .owner-profile canvas {
    width: 96px;
    height: 96px;
    image-rendering: pixelated;
    margin: 8px 0;
  }
  .owner-profile .owner-illust {
    max-width: 200px;
    max-height: 260px;
    width: auto;
    height: auto;
    margin: 8px auto;
    display: block;
    border: 2px solid var(--ink);
    background: var(--paper);
    box-shadow: 4px 4px 0 var(--ink);
  }
  .owner-profile .owner-name {
    font-size: 14px;
    color: var(--ink);
    margin: 4px 0;
    letter-spacing: 2px;
  }
  .owner-profile .owner-role {
    font-size: 10px;
    color: var(--green-dark);
    letter-spacing: 3px;
    margin-bottom: 8px;
  }
  .owner-profile p {
    font-size: 11px;
    text-align: left;
    line-height: 1.6;
    margin: 6px 0;
  }
  .owner-profile .owner-quote {
    background: var(--paper);
    border-left: 3px solid var(--gold);
    padding: 6px 8px;
    margin: 8px 0;
    font-size: 11px;
    color: var(--ink);
    font-style: italic;
    text-align: left;
  }
  .owner-profile .owner-tag {
    display: inline-block;
    background: var(--ink);
    color: var(--gold);
    padding: 2px 6px;
    font-size: 9px;
    margin: 2px;
    letter-spacing: 1px;
  }

  /* モーダル */
  .modal {
    position: fixed;
    inset: 0;
    background: #000000c0;
    z-index: 90;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .modal-content {
    background: var(--paper);
    border: 4px solid var(--ink);
    box-shadow: 0 0 0 2px var(--gold), 8px 8px 0 #000;
    max-width: 380px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
  }

  .modal-header {
    background: var(--ink);
    color: var(--gold);
    padding: 10px;
    font-size: 13px;
    text-align: center;
    letter-spacing: 2px;
  }

  .modal-body {
    padding: 14px;
    font-size: 11px;
    line-height: 1.6;
  }

  .modal-body h3 {
    color: var(--red-dark);
    font-size: 12px;
    margin: 10px 0 4px;
    border-bottom: 1px dashed var(--ink);
  }

  .modal-buttons {
    padding: 10px;
    display: flex;
    gap: 8px;
    border-top: 2px dashed var(--ink);
  }

  .modal-buttons button { flex: 1; }

  /* 結果画面の数値 */
  .result-grid {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4px 12px;
    font-size: 11px;
    margin: 8px 0;
  }

  .result-grid .label { color: var(--green-dark); }
  .result-grid .value { font-weight: bold; text-align: right; }
  .result-grid .value.gold { color: var(--red-dark); }

  /* お客さん入店アニメーション */
  @keyframes enter {
    from { transform: translateX(-100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .customer-area.entering .customer-sprite,
  .customer-area.entering .customer-text {
    animation: enter 0.3s ease-out;
  }

  /* 仕入れフェーズ上部の樽プレビュー */
  .barrels-preview {
    background: var(--ink);
    border: 2px solid var(--gold);
    padding: 6px;
    margin-bottom: 10px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 4px;
  }

  .barrel-slot {
    background: var(--paper-dark);
    border: 1px solid var(--paper);
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    color: var(--ink);
    position: relative;
    min-height: 36px;
  }

  .barrel-slot.empty {
    background: repeating-linear-gradient(45deg, #4a3828 0 3px, #2d1f17 3px 4px);
    color: #88775a;
  }

  .barrel-slot.filled {
    background: var(--paper);
  }

  .barrel-slot canvas {
    width: 24px;
    height: 24px;
    image-rendering: pixelated;
  }

  .barrel-slot .slot-num {
    position: absolute;
    top: 1px;
    left: 2px;
    font-size: 8px;
    color: var(--green-dark);
    background: var(--paper);
    padding: 0 2px;
    border: 1px solid var(--ink);
  }

  /* 仕入れアニメーション: ぴょこっと跳ねる */
  @keyframes drop-in {
    0% { transform: translateY(-30px) scale(0.3); opacity: 0; }
    60% { transform: translateY(4px) scale(1.1); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  .barrel-slot.just-bought canvas {
    animation: drop-in 0.4s ease-out;
  }

  .barrel-slot.just-bought {
    box-shadow: 0 0 0 2px var(--gold);
    animation: flash 0.4s;
  }

  @keyframes flash {
    0%, 100% { background: var(--paper); }
    50% { background: var(--gold); }
  }

  /* 仕入れ済みアイテムのバッジ */
  .item-row .stock-badge {
    background: var(--green);
    color: var(--paper);
    padding: 2px 5px;
    font-size: 9px;
    border: 1px solid var(--ink);
    margin-right: 4px;
  }

  .item-row.bought {
    background: #e8d8a8;
  }

  /* 樽スロット内の取消ボタン */
  .barrel-slot.filled {
    cursor: pointer;
  }

  .barrel-slot .cancel-mark {
    position: absolute;
    top: 1px;
    right: 2px;
    background: var(--red);
    color: var(--paper);
    font-size: 8px;
    width: 12px;
    height: 12px;
    line-height: 11px;
    text-align: center;
    border: 1px solid var(--ink);
  }

  /* 仕入れサマリー */
  .buy-summary {
    background: var(--ink);
    color: var(--paper);
    padding: 6px 8px;
    margin-bottom: 8px;
    font-size: 11px;
    border: 2px solid var(--gold);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* 樽購入ショップ */
  .barrel-shop {
    background: linear-gradient(180deg, #d4b896 0%, #c8a878 100%);
    border: 2px solid var(--ink);
    padding: 6px 8px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 2px 2px 0 var(--ink);
  }
  .barrel-shop.full {
    justify-content: center;
    color: var(--green-dark);
    font-size: 10px;
    padding: 8px;
  }
  .barrel-shop-icon {
    font-size: 22px;
    flex-shrink: 0;
  }
  .barrel-shop-info {
    flex: 1;
    min-width: 0;
  }
  .barrel-shop-title {
    font-size: 11px;
    color: var(--ink);
    font-weight: bold;
  }
  .barrel-shop-desc {
    font-size: 10px;
    color: var(--green-dark);
  }
  .barrel-shop button {
    background: var(--gold);
    color: var(--ink);
    font-weight: bold;
    padding: 6px 10px;
  }

  .buy-summary .total {
    color: var(--gold);
    font-size: 13px;
  }

  .buy-summary .remaining {
    font-size: 10px;
    color: var(--paper-dark);
  }

  /* 確定ボタンを目立たせる */
  .footer button.confirm {
    background: var(--green);
    color: var(--paper);
    font-weight: bold;
  }

  .footer button.confirm:disabled {
    background: var(--paper-dark);
    color: #888;
  }

  /* 客の好みヒント */
  .customer-hint {
    background: var(--paper-dark);
    border: 2px solid var(--ink);
    padding: 8px 10px;
    margin-top: 6px;
    font-size: 11px;
    color: var(--ink);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }

  .customer-hint .hint-block {
    text-align: center;
  }
  .customer-hint .hint-label {
    display: block;
    font-size: 9px;
    color: var(--green-dark);
    margin-bottom: 2px;
  }
  .customer-hint .hint-value {
    font-size: 12px;
    font-weight: bold;
    color: var(--red-dark);
  }
  .customer-hint .hint-flavor-chip {
    display: inline-block;
    padding: 3px 8px;
    font-size: 12px;
    border: 2px solid var(--ink);
    font-weight: bold;
    box-shadow: 1px 1px 0 var(--ink);
  }
  .customer-hint .hint-icon {
    color: var(--red-dark);
    font-weight: bold;
  }

  /* 商品行で「客の好みに合う」場合のハイライト */
  .sell-row.match-flavor {
    background: linear-gradient(180deg, #fff4d0 0%, #ffe890 100%) !important;
    border: 2px solid var(--gold) !important;
    box-shadow: 0 0 0 1px var(--red-dark), 2px 2px 0 var(--ink);
    animation: glow-match 2s ease-in-out infinite;
  }
  @keyframes glow-match {
    0%, 100% { box-shadow: 0 0 0 1px var(--red-dark), 2px 2px 0 var(--ink); }
    50% { box-shadow: 0 0 0 2px var(--red), 2px 2px 0 var(--ink); }
  }

  .match-badge {
    display: inline-block;
    background: var(--red);
    color: var(--paper);
    font-size: 9px;
    padding: 2px 5px;
    margin-left: 4px;
    border: 1px solid var(--ink);
    animation: glow-match 1.5s ease-in-out infinite;
  }

  /* 屋号入力 */
  .name-input-area {
    margin: 20px 0;
    text-align: center;
  }

  .name-input-area label {
    display: block;
    font-size: 11px;
    color: var(--paper-dark);
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  .name-input {
    font-family: inherit;
    font-size: 14px;
    text-align: center;
    background: var(--paper);
    color: var(--ink);
    border: 2px solid var(--gold);
    padding: 6px 10px;
    width: 200px;
  }

  .name-input:focus {
    outline: 2px solid var(--gold);
    background: var(--paper-dark);
  }

  .name-suffix {
    color: var(--gold);
    font-size: 13px;
    margin-left: 4px;
  }

  /* お薦め判定の表示色分け */
  .match-good { color: var(--green-dark); font-weight: bold; }
  .match-bad { color: var(--red-dark); }

  /* 季節アイコン */
  .season-icon {
    display: inline-block;
    width: 12px;
    text-align: center;
    margin-right: 4px;
  }

  /* チップ */
  .chip {
    display: inline-block;
    background: var(--ink);
    color: var(--paper);
    padding: 2px 6px;
    font-size: 9px;
    margin-right: 4px;
    border-radius: 0;
  }

  .chip.season-spring { background: #e87aa0; }
  .chip.season-summer { background: #4a9ec8; }
  .chip.season-autumn { background: #c8682a; }
  .chip.season-winter { background: #6a86a8; }

  hr {
    border: none;
    border-top: 1px dashed var(--ink);
    margin: 8px 0;
  }

  .center { text-align: center; }
  .small { font-size: 10px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="app">
  <div class="header">

function drawSprite(canvas, spriteName, scale = 1) {
  const sprite = SPRITES[spriteName];
  if (!sprite) return;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const w = sprite[0].length;
  const h = sprite.length;
  canvas.width = w;
  canvas.height = h;
  if (scale > 1) {
    canvas.style.width = (w * scale) + 'px';
    canvas.style.height = (h * scale) + 'px';
  }
  ctx.clearRect(0, 0, w, h);
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const c = sprite[y][x];
      const color = PALETTE[c];
      if (color) {
        ctx.fillStyle = color;
        ctx.fillRect(x, y, 1, 1);
      }
    }
  }
}

function spriteCanvas(spriteName, className = 'item-sprite') {
  return `<canvas class="${className}" data-sprite="${spriteName}"></canvas>`;
}

function renderSprites(container) {
  container.querySelectorAll('canvas[data-sprite]').forEach(c => {
    drawSprite(c, c.dataset.sprite);
  });
}

// 画像ロード失敗時にドット絵canvasへ差し替えるグローバルハンドラ
// imgタグに onerror="imgFallbackToSprite(this)" data-sprite="xxx" data-cls="yyy" を付ける
window.imgFallbackToSprite = function(img) {
  const spriteName = img.getAttribute('data-sprite');
  const cls = img.getAttribute('data-cls') || '';
  const canvas = document.createElement('canvas');
  if (cls) canvas.className = cls;
  canvas.setAttribute('data-sprite', spriteName);
  img.replaceWith(canvas);
  drawSprite(canvas, spriteName);
};

function $(id) { return document.getElementById(id); }

function getCurrentSeasonVegs() {
  return VEGETABLES.filter(v => v.seasons.includes(game.season));
}

function getCurrentCost(veg) {
  // 季節限定品は15%引きで仕入れられる(地元)
  const isSeasonal = veg.seasons.length <= 2;
  let cost = veg.baseCost;
  if (isSeasonal && veg.seasons.includes(game.season)) {
    cost = Math.round(cost * 0.85);
  }
  return cost;
}

// 章ごとの売上目標
function getChapterGoal() {
  // 加工品・味マッチ・レシピボーナスを織り込んだ厳しめ設定
  // 1週:3000, 2週:5000, 3週:8000, 4週:12000, 5週以降:15000 + (章-5)*2500
  const c = game.chapter;
  if (c === 1) return 3000;
  if (c === 2) return 5000;
  if (c === 3) return 8000;
  if (c === 4) return 12000;
  return 15000 + (c - 5) * 2500;
}

// 看板娘ボーナスの集計
function getGirlBonus() {
  const bonus = { stamina: 0, priceBonus: 0, customerBonus: 0 };
  game.girls.forEach(gid => {
    const g = GIRLS.find(x => x.id === gid);
    if (!g) return;
    if (g.bonus.stamina) bonus.stamina += g.bonus.stamina;
    if (g.bonus.priceBonus) bonus.priceBonus += g.bonus.priceBonus;
    if (g.bonus.customerBonus) bonus.customerBonus += g.bonus.customerBonus;
  });
  return bonus;
}

// 1日のお客数(スタミナ)
function getDailyStamina() {
  const bonus = getGirlBonus();
  return BASE_STAMINA + bonus.stamina + Math.floor(game.reputation / 30);
}

// 1日の最大客数(評判+娘ボーナス+週ボーナス込み)
function getDailyCustomerCount() {
  const bonus = getGirlBonus();
  return getDailyStamina() + bonus.customerBonus + weeklyBonus.customerBonus;
}

// レシピの売値ボーナス
function getRecipeBonus(stage, vegId) {
  let bonus = 0;
  game.recipes.forEach(rid => {
    const r = RECIPES.find(x => x.id === rid);
    if (!r || !r.effect) return;
    if (stage === 'asa' && r.effect.asaBonus) bonus += r.effect.asaBonus;
    if (stage === 'good' && r.effect.goodBonus) bonus += r.effect.goodBonus;
    if (stage === 'furu' && r.effect.furuBonus) bonus += r.effect.furuBonus;
    if (r.effect.allBonus) bonus += r.effect.allBonus;
    if (r.effect.specificBonus && vegId && r.effect.specificBonus[vegId]) {
      bonus += r.effect.specificBonus[vegId];
    }
  });
  return bonus;
}

// 食べごろ期間延長(レシピ)
function getGoodExtend() {
  let extend = 0;
  game.recipes.forEach(rid => {
    const r = RECIPES.find(x => x.id === rid);
    if (r && r.effect && r.effect.goodExtend) extend += r.effect.goodExtend;
  });
  return extend;
}

// 古漬け期間延長(レシピ)
function getFuruExtend() {
  let extend = 0;
  game.recipes.forEach(rid => {
    const r = RECIPES.find(x => x.id === rid);
    if (r && r.effect && r.effect.furuExtend) extend += r.effect.furuExtend;
  });
  return extend;
}

// 看板娘ボーナス + レシピ + 週ボーナス込みの販売価格倍率
function getPriceMultiplier(stage, vegId) {
  const girl = getGirlBonus();
  const recipe = getRecipeBonus(stage, vegId);
  return 1.0 + girl.priceBonus + recipe + weeklyBonus.priceBonus;
}

// レシピのアンロック判定
function checkRecipeUnlock() {
  const newlyUnlocked = [];
  RECIPES.forEach(r => {
    if (game.recipes.includes(r.id)) return;
    const c = r.condition;
    let ok = true;
    if (c.soldAsa && game.stats.soldAsa < c.soldAsa) ok = false;
    if (c.soldGood && game.stats.soldGood < c.soldGood) ok = false;
    if (c.soldFuru && game.stats.soldFuru < c.soldFuru) ok = false;
    if (c.totalSold && game.totalSold < c.totalSold) ok = false;
    if (c.totalRevenue && game.totalRevenue < c.totalRevenue) ok = false;
    if (c.seasonReached && !game.seasonsVisited.includes(c.seasonReached)) ok = false;
    if (c.girlJoined) {
      if (!game.girls.includes(c.girlJoined)) ok = false;
      else if (c.daysAfter) {
        const joinDay = game.girlJoinDay[c.girlJoined];
        if (!joinDay || (game.day - joinDay) < c.daysAfter) ok = false;
      }
    }
    if (ok) {
      game.recipes.push(r.id);
      newlyUnlocked.push(r);
    }
  });
  return newlyUnlocked;
}

const SAVE_KEY = 'oshinkoya_save_v1';

function saveGame() {
  try {
    const data = {
      game: game,
      savedAt: new Date().toISOString(),
      version: 1,
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    return true;
  } catch (e) {
    console.error('save failed', e);
    return false;
  }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    return data;
  } catch (e) {
    console.error('load failed', e);
    return null;
  }
}

function hasSave() {
  try {
    return !!localStorage.getItem(SAVE_KEY);
  } catch (e) {
    return false;
  }
}

function deleteSave() {
  try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
}

// セーブから復元
function restoreFromSave(saveData) {
  const saved = saveData.game;
  Object.keys(saved).forEach(k => { game[k] = saved[k]; });
  if (!game.barrelCount) game.barrelCount = 6;
  while (game.barrels.length < game.barrelCount) game.barrels.push(null);
  game.barrels.forEach(b => {
    if (b && b.display === undefined) b.display = true;
  });
  // v6→v7移行用フィールド補完
  if (!game.seenEvents) game.seenEvents = [];
  if (!game.seasonsVisited) game.seasonsVisited = ['春'];
  if (!game.girlJoinDay) game.girlJoinDay = {};
  if (!game.dishes) game.dishes = [];
  if (!game.dishSlots) game.dishSlots = 8;
  // 古いセーブのdishesにdisplay未定義の場合は補完
  game.dishes.forEach(d => {
    if (d.display === undefined) d.display = true;
  });
  if (game.extendedPlay === undefined) game.extendedPlay = false;
}

const RANKING_KEY = 'oshinkoya_ranking_v1';

// ▼▼▼ オンラインランキング設定(Firebase Realtime Database) ▼▼▼
// 使い方:
// 1. https://console.firebase.google.com/ でプロジェクトを作成
// 2. 「Realtime Database」を作成(テストモードで開始)
// 3. プロジェクト設定 > 全般 > マイアプリ(ウェブ </>)を追加
// 4. 表示される databaseURL を下の FIREBASE_DB_URL に貼り付ける
//    例: https://oshinkoya-xxxx-default-rtdb.firebaseio.com
// 5. 空文字のままだとオンライン機能はオフ(ローカルのみ)になる
const FIREBASE_DB_URL = 'https://oshinkoya-b4967-default-rtdb.firebaseio.com'; // ← ここにあなたのdatabaseURLを貼る
// ▲▲▲ ここまで ▲▲▲

const ONLINE_RANKING_ENABLED = () => FIREBASE_DB_URL && FIREBASE_DB_URL.startsWith('http');

function loadRanking() {
  try {
    const raw = localStorage.getItem(RANKING_KEY);
    if (!raw) return [];
    return JSON.parse(raw);
  } catch (e) { return []; }
}

function addToRanking(entry) {
  try {
    const ranking = loadRanking();
    ranking.push(entry);
    ranking.sort((a, b) => b.totalRevenue - a.totalRevenue);
    const trimmed = ranking.slice(0, MAX_RANKING);
    localStorage.setItem(RANKING_KEY, JSON.stringify(trimmed));
    return trimmed.findIndex(e => e === entry) + 1; // 順位
  } catch (e) { return -1; }
}

function recordCurrentGame(endingType) {
  const entry = {
    shopName: game.shopName,
    chapter: game.chapter,
    money: game.money,
    totalRevenue: game.totalRevenue,
    totalSold: game.totalSold,
    girls: game.girls.length,
    recipes: game.recipes.length,
    reputation: game.reputation,
    endingType: endingType,
    date: new Date().toISOString(),
  };
  // ローカルに記録
  const rank = addToRanking(entry);
  // オンラインにも送信(設定済みの場合)
  if (ONLINE_RANKING_ENABLED()) {
    submitOnlineScore(entry);
  }
  return rank;
}

// オンラインにスコアを送信(Firebase REST API)
function submitOnlineScore(entry) {
  try {
    fetch(`${FIREBASE_DB_URL}/scores.json`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entry),
    }).catch(e => console.log('オンライン送信失敗:', e));
  } catch (e) {
    console.log('オンライン送信エラー:', e);
  }
}

// オンラインランキングを取得(総売上トップ20)
async function fetchOnlineRanking() {
  if (!ONLINE_RANKING_ENABLED()) return null;
  try {
    // 総売上順で上位を取得(Firebaseのクエリ)
    const url = `${FIREBASE_DB_URL}/scores.json?orderBy="totalRevenue"&limitToLast=20`;
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();
    if (!data) return [];
    // オブジェクト→配列に変換して降順ソート
    const arr = Object.values(data);
    arr.sort((a, b) => b.totalRevenue - a.totalRevenue);
    return arr.slice(0, 20);
  } catch (e) {
    console.log('オンライン取得エラー:', e);
    return null;
  }
}


function getBarrelStatus(barrel) {
  if (!barrel) return null;
  const veg = VEGETABLES.find(v => v.id === barrel.vegId);
  const ideal = veg.pickleDays;
  const age = barrel.age;
  const goodExt = getGoodExtend();
  const furuExt = getFuruExtend();
  const goodEnd = ideal + 1 + goodExt;       // 食べごろの終わり
  const furuEnd = goodEnd + 3 + furuExt;     // 古漬けの終わり
  if (age < ideal) return { stage: 'asa', label: '浅漬け', mult: 0.7 };
  if (age <= goodEnd) return { stage: 'good', label: '食べごろ', mult: 1.0 };
  if (age <= furuEnd) return { stage: 'furu', label: '古漬け', mult: 0.85 };
  return { stage: 'bad', label: '傷み', mult: 0 };
}

// 漬物の「実際の味」を熟成度を加味して返す
// 浅漬け=元の味+さっぱり寄り / 古漬け=酸味と塩辛が増す
function getEffectiveFlavors(barrel) {
  if (!barrel) return [];
  const veg = VEGETABLES.find(v => v.id === barrel.vegId);
  const base = veg.flavors ? [...veg.flavors] : [];
  const status = getBarrelStatus(barrel);
  if (!status) return base;

  const flavors = new Set(base);
  if (status.stage === 'asa') {
    // 浅漬けは爽やかさが出る
    flavors.add('さっぱり');
  } else if (status.stage === 'furu') {
    // 古漬けは発酵で酸味が増し、塩辛さも出る
    flavors.add('酸味');
    flavors.add('塩辛');
    // 浅い爽やかさは失われる
    flavors.delete('さっぱり');
  }
  return Array.from(flavors);
}

// 樽の購入価格(段階的に上がる)
function getBarrelPrice() {
  const n = game.barrelCount; // 現在の数
  // 7個目=2000, 8=3500, 9=5500, 10=8000, 11=11000, 12=15000
  if (n >= 12) return null; // 上限
  const idx = n - 6; // 0,1,2,3,4,5
  const prices = [2000, 3500, 5500, 8000, 11000, 15000];
  return prices[idx];
}

let buyQueue = []; // 仮選択中の野菜ID配列(確定するまで保留)
let justBoughtBarrelIdx = -1; // アニメーション用

function renderMorning(main, footer, banner) {
  const vegs = getCurrentSeasonVegs();
  let html = banner;

  // 看板娘がいたら店内に表示
  if (game.girls.length > 0) {
    html += `<div class="girls-strip">`;
    game.girls.forEach(gid => {
      const g = GIRLS.find(x => x.id === gid);
      // 画像があれば<img>、なければcanvas(ドット絵)にフォールバック
      html += `<img class="girl-icon" src="${g.dotImg}" alt="${g.name}" data-sprite="${g.sprite}" data-cls="girl-icon" onerror="imgFallbackToSprite(this)">`;
    });
    const names = game.girls.map(gid => GIRLS.find(x => x.id === gid).name).join('・');
    html += `<div class="girl-icon-info"><span class="girl-name">${names}</span><br>今日もよろしくお願いします!</div>`;
    html += `</div>`;
  }

  html += `<div class="phase-title">朝の市場</div>`;

  // 樽配列の長さをbarrelCountと合わせる(増設後の保険)
  while (game.barrels.length < game.barrelCount) game.barrels.push(null);

  // 現在使用中の樽 + 仮選択分の合計
  const usedBarrels = game.barrels.map(b => b); // コピー
  const previewBarrels = [...usedBarrels];
  // 空きスロットに仮選択分を埋める(プレビュー用)
  const tempSlots = []; // {idx, vegId, isTemp}
  buyQueue.forEach((vegId) => {
    const emptyIdx = previewBarrels.findIndex(b => b === null);
    if (emptyIdx !== -1) {
      previewBarrels[emptyIdx] = { vegId, age: 0, isTemp: true };
      tempSlots.push(emptyIdx);
    }
  });

  // 仮選択分の合計金額
  const tempTotal = buyQueue.reduce((sum, vegId) => {
    return sum + getCurrentCost(VEGETABLES.find(v => v.id === vegId));
  }, 0);
  const remainAfter = game.money - tempTotal;
  const emptyCount = previewBarrels.filter(b => b === null).length;

  // 仕入れサマリー
  html += `<div class="buy-summary">`;
  html += `<span>仮仕入れ合計: <span class="total">¥${tempTotal.toLocaleString()}</span></span>`;
  html += `<span class="remaining">残金 ¥${remainAfter.toLocaleString()}</span>`;
  html += `</div>`;

  // 樽プレビュー
  html += `<div class="small center" style="margin-bottom:4px;">樽の状況 (空き${emptyCount}/${game.barrelCount})・✕で取消</div>`;
  html += `<div class="barrels-preview">`;
  previewBarrels.forEach((b, i) => {
    const isJust = i === justBoughtBarrelIdx;
    if (!b) {
      html += `<div class="barrel-slot empty"><span class="slot-num">${i+1}</span>空</div>`;
    } else {
      const veg = VEGETABLES.find(v => v.id === b.vegId);
      const isTemp = b.isTemp;
      // 仮選択分のみ取消可能
      const cancelBtn = isTemp ? `<span class="cancel-mark" onclick="event.stopPropagation(); cancelBuy(${tempSlots.indexOf(i)})">✕</span>` : '';
      html += `<div class="barrel-slot filled ${isJust ? 'just-bought' : ''}" ${isTemp ? `onclick="cancelBuy(${tempSlots.indexOf(i)})"` : ''}>
        <span class="slot-num">${i+1}</span>
        ${cancelBtn}
        ${spriteCanvas(veg.sprite)}
      </div>`;
    }
  });
  html += `</div>`;

  // 樽購入ボタン(上限まで表示)
  const barrelPrice = getBarrelPrice();
  if (barrelPrice !== null) {
    const canAffordBarrel = remainAfter >= barrelPrice;
    html += `
      <div class="barrel-shop">
        <span class="barrel-shop-icon">🛢</span>
        <div class="barrel-shop-info">
          <div class="barrel-shop-title">樽を増設</div>
          <div class="barrel-shop-desc">${game.barrelCount} → ${game.barrelCount + 1}個</div>
        </div>
        <button onclick="buyBarrel()" ${canAffordBarrel ? '' : 'disabled'}>¥${barrelPrice.toLocaleString()}</button>
      </div>
    `;
  } else {
    html += `<div class="barrel-shop full"><span class="barrel-shop-icon">🛢</span>樽は最大の${MAX_BARRELS}個まで増設済み</div>`;
  }

  if (emptyCount === 0) {
    html += `<div class="card center small" style="background:#e8c878;">⚠ 樽が満杯です。販売して空きを作るか、仕入れを取り消してください。</div>`;
  } else if (buyQueue.length > 0) {
    html += `<div class="small center" style="margin-bottom:8px;">続けて仕入れるか、下の「仕入れ確定」をタップ</div>`;
  } else {
    html += `<div class="small center" style="margin-bottom:8px;">仕入れる野菜をタップ</div>`;
  }

  // 在庫表示用カウント(確定済み+仮選択)
  const stockCount = {};
  previewBarrels.forEach(b => {
    if (b) stockCount[b.vegId] = (stockCount[b.vegId] || 0) + 1;
  });

  vegs.forEach(veg => {
    const cost = getCurrentCost(veg);
    const isSeasonal = veg.seasons.length <= 2 && veg.seasons.includes(game.season);
    const canBuy = remainAfter >= cost && emptyCount > 0;
    const inStock = stockCount[veg.id] || 0;
    const flavorChips = veg.flavors ? veg.flavors.map(f => `<span class="flavor-chip flavor-${f}">${f}</span>`).join('') : '';
    html += `
      <div class="item-row ${inStock > 0 ? 'bought' : ''}">
        ${spriteCanvas(veg.sprite)}
        <div class="item-info">
          <div class="item-name">${inStock > 0 ? '<span class="stock-badge">' + inStock + '</span>' : ''}${veg.name}${isSeasonal ? ' <span class="chip season-' + SEASON_COLORS[game.season] + '">旬</span>' : ''}</div>
          <div class="item-detail"><span class="price">¥${cost}</span> · 漬け${veg.pickleDays}日 ${flavorChips}</div>
        </div>
        <button onclick="buyVeg('${veg.id}')" ${canBuy ? '' : 'disabled'}>仕入</button>
      </div>
    `;
  });

  main.innerHTML = html;

  // フッター: 仮選択があれば「確定」、なければ「樽へ進む」
  if (buyQueue.length > 0) {
    footer.innerHTML = `
      <button onclick="cancelAllBuy()">すべて取消</button>
      <button class="confirm" onclick="confirmBuy()">▶ 仕入れ確定 (${buyQueue.length}点)</button>
    `;
  } else {
    footer.innerHTML = `
      <button class="green" onclick="goToPhase('pickle')">▶ 樽へ進む</button>
    `;
  }
}

window.buyVeg = function(vegId) {
  const veg = VEGETABLES.find(v => v.id === vegId);
  const cost = getCurrentCost(veg);

  // 仮選択中の総額をチェック
  const currentQueueCost = buyQueue.reduce((sum, id) => {
    return sum + getCurrentCost(VEGETABLES.find(v => v.id === id));
  }, 0);
  if (game.money - currentQueueCost < cost) return;

  // 空き樽チェック(確定済み + 仮選択分を考慮)
  const usedSlots = game.barrels.filter(b => b !== null).length + buyQueue.length;
  if (usedSlots >= game.barrelCount) {
    showModal('樽が満杯', '<p>これ以上仕入れられません。仕入れを取り消すか、確定して販売へ進んでください。</p>', [{label: '閉じる', action: closeModal}]);
    return;
  }

  buyQueue.push(vegId);

  // アニメーション用に「次に埋まる位置」を計算
  const tempBarrels = [...game.barrels];
  buyQueue.slice(0, -1).forEach(id => {
    const idx = tempBarrels.findIndex(b => b === null);
    if (idx !== -1) tempBarrels[idx] = { vegId: id };
  });
  justBoughtBarrelIdx = tempBarrels.findIndex(b => b === null);

  renderPhase();
  setTimeout(() => { justBoughtBarrelIdx = -1; }, 500);
};

window.cancelBuy = function(queueIdx) {
  if (queueIdx < 0 || queueIdx >= buyQueue.length) return;
  buyQueue.splice(queueIdx, 1);
  renderPhase();
};

window.cancelAllBuy = function() {
  buyQueue = [];
  renderPhase();
};

window.confirmBuy = function() {
  // 仮選択分を実際の樽と所持金に反映
  buyQueue.forEach(vegId => {
    const veg = VEGETABLES.find(v => v.id === vegId);
    const cost = getCurrentCost(veg);
    const emptyIdx = game.barrels.findIndex(b => b === null);
    if (emptyIdx === -1) return;
    game.money -= cost;
    game.barrels[emptyIdx] = { vegId, age: 0, display: false };
    addLog(`${veg.name}を¥${cost}で仕入れて${emptyIdx+1}番樽へ`);
  });
  const count = buyQueue.length;
  buyQueue = [];

  showModal(
    '仕入れ完了',
    `<div class="center">
      <p style="font-size:13px;margin:10px 0;">${count}点を仕入れました。</p>
      <p class="small" style="text-align:left;line-height:1.6;">
      💡 樽画面で漬物の状態を確認できます。<br>
      🛢 熟成中の樽は日数が経つと味が変わります。<br>
      🏪 樽をタップして「店頭」に出すと、お客に売れるようになります。
      </p>
    </div>`,
    [{ label: '▶ 樽へ', action: () => { closeModal(); goToPhase('pickle'); } }]
  );
};

// ============================================================
// 樽フェーズ: 確認のみ
// ============================================================
function renderPickle(main, footer, banner) {
  let html = banner;
  html += `<div class="phase-title">漬物樽</div>`;

  // 樽配列の長さをbarrelCountと合わせる
  while (game.barrels.length < game.barrelCount) game.barrels.push(null);

  const displayCount = game.barrels.filter(b => b && b.display).length;
  const agingCount = game.barrels.filter(b => b && !b.display).length;
  html += `<div class="card" style="background:var(--paper);padding:6px 8px;margin-bottom:8px;font-size:10px;">`;
  html += `🏪 店頭: ${displayCount}個 ・ 🛢 熟成中: ${agingCount}個 ・ 空き: ${game.barrelCount - displayCount - agingCount}個`;
  html += `</div>`;

  if (displayCount === 0 && agingCount > 0) {
    html += `<div class="card center small" style="background:#ffe080;border:2px solid var(--red);padding:8px;margin-bottom:8px;">
      ⚠ 店頭に出した漬物がありません<br>
      下の樽をタップして「🏪 店頭」に切り替えてください
    </div>`;
  }

  html += `<div class="small center" style="margin-bottom:8px;">タップで「店頭に出す/熟成に戻す」を切替</div>`;

  html += `<div class="barrels">`;
  game.barrels.slice(0, game.barrelCount).forEach((b, i) => {
    if (!b) {
      html += `<div class="barrel empty">空き樽 #${i+1}</div>`;
    } else {
      const veg = VEGETABLES.find(v => v.id === b.vegId);
      const status = getBarrelStatus(b);
      const isDisplay = b.display;
      const onclick = `onclick="toggleBarrelDisplay(${i})"`;
      const flavors = veg.flavors ? veg.flavors.map(f => `<span class="flavor-chip flavor-${f}">${f}</span>`).join(' ') : '';
      html += `
        <div class="barrel ${isDisplay ? 'on-display' : 'aging'}" ${onclick}>
          <div class="barrel-header">
            ${spriteCanvas(veg.sprite)}
            <span class="barrel-name">${veg.name}</span>
          </div>
          <div class="barrel-days">${b.age}日経過 / 目安${veg.pickleDays}日</div>
          <div class="barrel-status status-${status.stage}">${status.label}</div>
          <div class="barrel-flavors">${flavors}</div>
          <div class="barrel-display-tag">${isDisplay ? '🏪 店頭' : '🛢 熟成中'}</div>
        </div>
      `;
    }
  });
  html += `</div>`;

  html += `<hr><div class="small">浅漬け=爽やか/食べごろ=最高値/古漬け=独特の風味/傷み=売れません<br>※ 店頭に出した漬物のみ客に売れます。熟成中はさらに漬かります</div>`;

  // 加工品レシピ(料理レシピを所持している場合のみ)
  const dishRecipes = RECIPES.filter(r => r.type === 'dish' && game.recipes.includes(r.id));
  if (dishRecipes.length > 0) {
    const displayDishes = game.dishes.filter(d => d.display).length;
    const storedDishes = game.dishes.filter(d => !d.display).length;
    const isFull = game.dishes.length >= game.dishSlots;

    html += `<div class="dish-section">`;
    html += `<div class="dish-section-title">🍱 加工品コーナー</div>`;
    html += `<div class="dish-section-desc">
      樽の漬物を素材に高値の加工品を作れます。<br>
      ※ 樽は消費されません(母樽として何度も使えます)
    </div>`;
    html += `<div class="dish-status-bar">
      📦 在庫 ${game.dishes.length}/${game.dishSlots}個
      ・🏪 店頭 ${displayDishes}個
      ・📥 倉庫 ${storedDishes}個
      ${isFull ? '<span class="dish-full-warn">⚠満杯</span>' : ''}
    </div>`;

    dishRecipes.forEach(r => {
      const usableBarrels = game.barrels
        .map((b, i) => ({ b, i }))
        .filter(x => x.b && getBarrelStatus(x.b).stage === r.consume);
      const canMake = usableBarrels.length > 0 && !isFull;
      const stageJp = r.consume === 'asa' ? '浅漬け' : r.consume === 'good' ? '食べごろ' : '古漬け';
      let btnText, btnClass;
      if (isFull) { btnText = '在庫満杯'; btnClass = ''; }
      else if (usableBarrels.length === 0) { btnText = stageJp + 'なし'; btnClass = ''; }
      else { btnText = '作る'; btnClass = 'primary'; }
      const recipeFlavorChip = r.flavor ? `<span class="flavor-chip flavor-${r.flavor}">${r.flavor}</span>` : '';
      html += `
        <div class="dish-recipe-row ${canMake ? 'can-make' : 'cannot-make'}">
          <span class="dish-icon">${r.icon}</span>
          <div class="dish-info">
            <div class="dish-name">${r.name} <span class="dish-price-tag">¥${r.produces}</span> ${recipeFlavorChip}</div>
            <div class="dish-desc">${stageJp}の樽が必要(消費なし)</div>
          </div>
          <button class="${btnClass}" onclick="makeDish('${r.id}')" ${canMake ? '' : 'disabled'}>${btnText}</button>
        </div>
      `;
    });

    // 加工品棚増設ボタン
    const slotPrice = getDishSlotPrice();
    if (slotPrice !== null) {
      const canAfford = game.money >= slotPrice;
      html += `
        <div class="dish-recipe-row" style="background:#e8d8a8;">
          <span class="dish-icon">📦</span>
          <div class="dish-info">
            <div class="dish-name">加工品棚を増設</div>
            <div class="dish-desc">${game.dishSlots} → ${game.dishSlots + 4}個に拡張</div>
          </div>
          <button onclick="buyDishSlot()" ${canAfford ? '' : 'disabled'}>¥${slotPrice.toLocaleString()}</button>
        </div>
      `;
    }

    // 既存の加工品在庫
    if (game.dishes.length > 0) {
      html += `<div class="dish-stock-title">📦 加工品在庫(タップで店頭/倉庫を切替)</div>`;
      game.dishes.forEach((d, i) => {
        const flavorChip = d.flavor ? `<span class="flavor-chip flavor-${d.flavor}">${d.flavor}</span>` : '';
        html += `
          <div class="dish-stock-row ${d.display ? 'on-display' : 'in-stock'}" onclick="toggleDishDisplay(${i})">
            <span class="dish-icon">${d.icon}</span>
            <span class="dish-name" style="flex:1;">${d.name} ${flavorChip}</span>
            <span class="dish-price">¥${d.price}</span>
            <span class="dish-display-tag">${d.display ? '🏪 店頭' : '📥 倉庫'}</span>
            <span class="dish-discard-btn" onclick="event.stopPropagation(); discardDish(${i})">✕</span>
          </div>
        `;
      });
    }
    html += `</div>`;
  }

  main.innerHTML = html;
  footer.innerHTML = `
    <button onclick="goToPhase('morning')">◀ 市場へ</button>
    <button class="primary" onclick="goToPhase('sell')">▶ 店開け</button>
  `;
}

window.makeDish = function(recipeId) {
  const r = RECIPES.find(x => x.id === recipeId);
  if (!r) return;
  // 加工品在庫の上限チェック
  if (game.dishes.length >= game.dishSlots) {
    showModal('加工品が満杯', `<div class="center"><p>加工品の在庫が満杯です(${game.dishSlots}個)。<br>販売するか、増設してください。</p></div>`, [{ label: '閉じる', action: closeModal }]);
    return;
  }
  // 必要状態の樽を探す(消費はしない・母樽として残す)
  const targetIdx = game.barrels.findIndex(b => b && getBarrelStatus(b).stage === r.consume);
  if (targetIdx === -1) return;
  const veg = VEGETABLES.find(v => v.id === game.barrels[targetIdx].vegId);
  game.dishes.push({
    recipeId: r.id,
    name: r.name + `(${veg.name})`,
    price: r.produces,
    icon: r.icon,
    flavor: r.flavor || null,
    display: true, // デフォルトで店頭
  });
  addLog(`${r.name}を作った(${veg.name}の${r.consume === 'asa' ? '浅漬け' : r.consume === 'good' ? '食べごろ' : '古漬け'}を使用)`);
  saveGame();
  renderPhase();
};

window.toggleDishDisplay = function(idx) {
  if (!game.dishes[idx]) return;
  game.dishes[idx].display = !game.dishes[idx].display;
  renderPhase();
};

window.discardDish = function(idx) {
  if (!game.dishes[idx]) return;
  game.dishes.splice(idx, 1);
  renderPhase();
};

window.buyDishSlot = function() {
  const price = getDishSlotPrice();
  if (price === null) return;
  if (game.money < price) return;
  showModal(
    '加工品棚を増設?',
    `<div class="center">
      <p style="margin:10px 0;">${game.dishSlots}個 → ${game.dishSlots + 4}個に増やしますか?</p>
      <p style="font-size:13px;color:#8b2828;">¥${price.toLocaleString()}</p>
    </div>`,
    [
      { label: 'やめる', action: closeModal },
      { label: '購入する', action: () => {
          game.money -= price;
          game.dishSlots += 4;
          addLog(`加工品棚を増設(¥${price.toLocaleString()}・全${game.dishSlots}個)`);
          saveGame();
          closeModal();
          renderPhase();
        }
      },
    ]
  );
};

function getDishSlotPrice() {
  // 4個ずつ増設、価格は段階的
  const tier = (game.dishSlots - 8) / 4; // 0=¥3000, 1=¥6000, 2=¥10000, 3=¥15000
  if (tier >= 4) return null; // 最大24個
  const prices = [3000, 6000, 10000, 15000];
  return prices[tier];
}

window.toggleBarrelDisplay = function(idx) {
  if (!game.barrels[idx]) return;
  const status = getBarrelStatus(game.barrels[idx]);
  if (status.stage === 'bad') {
    // 傷んでいる場合は店頭に出せない
    return;
  }
  game.barrels[idx].display = !game.barrels[idx].display;
  renderPhase();
};

// ============================================================
// 販売フェーズ: 値段設定 → 客対応
// ============================================================
let sellState = null; // { prices: {idx: price}, customersLeft: [], soldToday: [], revenueToday: 0 }

function renderSell(main, footer, banner) {
  // 初期化
  if (!sellState) {
    const customerCount = getDailyCustomerCount();
    const customers = [];
    for (let i = 0; i < customerCount; i++) {
      customers.push(CUSTOMERS[Math.floor(Math.random() * CUSTOMERS.length)]);
    }
    const defaultPrices = {};
    game.barrels.forEach((b, i) => {
      if (b) {
        const veg = VEGETABLES.find(v => v.id === b.vegId);
        defaultPrices[i] = Math.round(getCurrentCost(veg) * 1.8 / 10) * 10;
      }
    });
    sellState = {
      stage: 'pricing',
      prices: defaultPrices,
      customersLeft: customers,
      totalCustomers: customerCount,
      soldToday: [],
      revenueToday: 0,
      currentCustomer: null,
    };
  }

  if (sellState.stage === 'pricing') renderPricing(main, footer, banner);
  else if (sellState.stage === 'serving') renderServing(main, footer, banner);
}

function renderPricing(main, footer, banner) {
  let html = banner;
  html += `<div class="phase-title">値札を立てる</div>`;
  html += `<div class="card" style="background:var(--paper);padding:6px 8px;margin-bottom:8px;font-size:10px;">`;
  html += `📋 本日の見込み客: <b>${sellState.totalCustomers}人</b>`;
  const girl = getGirlBonus();
  if (girl.priceBonus > 0) {
    html += ` ・ 看板娘効果: 売値+${Math.round(girl.priceBonus*100)}%`;
  }
  html += `</div>`;

  const displayedBarrels = game.barrels.filter(b => b && b.display);
  const displayedDishes = game.dishes.filter(d => d.display);
  if (displayedBarrels.length === 0 && displayedDishes.length === 0) {
    html += `<div class="card center small" style="background:#e8c878;padding:10px;">⚠ 店頭に出した商品がありません<br>樽画面で漬物または加工品を「店頭」に出してください</div>`;
    main.innerHTML = html;
    footer.innerHTML = `
      <button onclick="goToPhase('pickle')">◀ 樽へ戻る</button>
    `;
    return;
  }

  // 加工品の値付け状況を表示
  if (displayedDishes.length > 0) {
    html += `<div class="card" style="background:#f8e890;padding:6px 8px;margin-bottom:8px;font-size:10px;">`;
    html += `🍱 加工品店頭 ${displayedDishes.length}個 ・ 売上¥${displayedDishes.reduce((s,d)=>s+d.price, 0).toLocaleString()}見込み`;
    html += `</div>`;
  }

  html += `<div class="small center" style="margin-bottom:8px;">本日の売値を決めてください(店頭の品のみ)</div>`;

  let anyForSale = false;
  game.barrels.forEach((b, i) => {
    if (!b || !b.display) return; // 店頭に出してる樽のみ
    const veg = VEGETABLES.find(v => v.id === b.vegId);
    const status = getBarrelStatus(b);
    const cost = getCurrentCost(veg);
    if (status.stage === 'bad') {
      html += `
        <div class="sell-row">
          ${spriteCanvas(veg.sprite)}
          <div class="item-info">
            <div class="item-name">${veg.name}</div>
            <div class="item-detail" style="color:#8b2828">傷んでいる - 売れません</div>
          </div>
          <button onclick="discardBarrel(${i})">廃棄</button>
        </div>
      `;
      return;
    }
    anyForSale = true;
    const mult = getPriceMultiplier(status.stage, veg.id);
    const finalPrice = Math.round(sellState.prices[i] * mult);
    const hasBonus = mult > 1.0;
    const flavors = veg.flavors ? veg.flavors.map(f => `<span class="flavor-chip flavor-${f}">${f}</span>`).join(' ') : '';
    html += `
      <div class="sell-row">
        ${spriteCanvas(veg.sprite)}
        <div class="item-info">
          <div class="item-name">${veg.name} <span class="chip">${status.label}</span> <span class="small" style="color:var(--green-dark);">${b.age}日漬/目安${veg.pickleDays}日</span></div>
          <div class="item-detail">${flavors} 原価¥${cost}${hasBonus ? ` ・ 実売¥${finalPrice}(+${Math.round((mult-1)*100)}%)` : ''}</div>
        </div>
        <input type="number" class="price-input" id="price-${i}" value="${sellState.prices[i]}" step="10" min="0" oninput="updatePrice(${i}, this.value)">
        <span class="small">円</span>
      </div>
    `;
  });

  const canOpen = anyForSale || displayedDishes.length > 0;
  if (!canOpen) {
    html += `<div class="card center small">売れる商品がありません(全て傷んでいる)</div>`;
  }

  main.innerHTML = html;
  footer.innerHTML = `
    <button onclick="goToPhase('pickle')">◀ 樽へ</button>
    <button class="primary" onclick="startServing()" ${canOpen ? '' : 'disabled'}>▶ 開店!</button>
  `;
}

window.updatePrice = function(idx, val) {
  sellState.prices[idx] = parseInt(val) || 0;
};

window.discardBarrel = function(idx) {
  game.barrels[idx] = null;
  addLog(`${idx+1}番樽を廃棄`, 'bad');
  game.reputation = Math.max(0, game.reputation - 2);
  renderPhase();
};

window.startServing = function() {
  sellState.stage = 'serving';
  nextCustomer();
};

function nextCustomer() {
  if (sellState.customersLeft.length === 0) {
    // 売り切り判定
    finishDay();
    return;
  }
  sellState.currentCustomer = sellState.customersLeft.shift();
  renderPhase();
}

function renderServing(main, footer, banner) {
  const customer = sellState.currentCustomer;
  if (!customer) return;

  const served = sellState.totalCustomers - sellState.customersLeft.length;
  const remaining = sellState.customersLeft.length + 1;

  let html = banner;
  html += `<div class="phase-title">本日の接客 ${served}/${sellState.totalCustomers}</div>`;

  html += `<div class="stamina-bar" style="justify-content:center;margin-bottom:6px;">残り客: `;
  for (let i = 0; i < sellState.totalCustomers; i++) {
    html += `<span class="stamina-dot ${i < served - 1 ? 'used' : ''}"></span>`;
  }
  html += `</div>`;

  const line = customer.lines[Math.floor(Math.random() * customer.lines.length)];
  const flavorChip = customer.flavorPrefer ? `<span class="hint-flavor-chip flavor-${customer.flavorPrefer}">${customer.flavorPrefer}</span>` : '<span class="hint-value">-</span>';
  html += `
    <div class="customer-area entering">
      <canvas class="customer-sprite" data-sprite="${customer.sprite}"></canvas>
      <div class="customer-text">
        <span class="name">${customer.name}</span>
        「${line}」
      </div>
    </div>
    <div class="customer-hint">
      <div class="hint-block">
        <span class="hint-label">♥ お好みの状態</span>
        <span class="hint-value">${customer.preferLabel}</span>
      </div>
      <div class="hint-block">
        <span class="hint-label">🌶 お好みの味</span>
        ${flavorChip}
      </div>
      <div class="hint-block">
        <span class="hint-label">¥ ご予算</span>
        <span class="hint-value" style="font-size:10px;">${customer.budget}</span>
      </div>
    </div>
  `;

  html += `<div class="small center" style="margin:6px 0;">店頭の品から薦めましょう ・ <span style="color:var(--red-dark);">★</span>=好みに合う</div>`;

  let anyShown = false;
  game.barrels.forEach((b, i) => {
    if (!b || !b.display) return; // 店頭出しのみ
    const veg = VEGETABLES.find(v => v.id === b.vegId);
    const status = getBarrelStatus(b);
    if (status.stage === 'bad') return;
    anyShown = true;
    const price = sellState.prices[i];
    const cost = getCurrentCost(veg);
    const fairPrice = cost * 1.8;
    const priceRatio = price / fairPrice;

    // 状態好み
    let preferMark = '';
    let preferClass = '';
    if (status.stage === customer.prefer) {
      preferMark = '★状態◎';
      preferClass = 'match-good';
    } else if (status.stage === 'good') {
      preferMark = '○状態○';
    } else {
      preferMark = '△状態△';
      preferClass = 'match-bad';
    }

    // 味マッチング(熟成による味変化を考慮)
    let flavorMark = '';
    let flavorClass = '';
    const effFlavors = getEffectiveFlavors(b);
    const flavorMatched = customer.flavorPrefer && effFlavors.includes(customer.flavorPrefer);
    if (flavorMatched) {
      flavorMark = '★味◎';
      flavorClass = 'match-good';
    } else {
      flavorMark = '△味△';
    }

    // 価格適合度
    let priceMark = '';
    let priceClass = '';
    if (priceRatio <= customer.priceTolerance) {
      priceMark = '○値◎';
    } else if (priceRatio <= customer.maxPrice) {
      priceMark = '○値△';
    } else {
      priceMark = '△高すぎ';
      priceClass = 'match-bad';
    }

    // 状態+味のW一致でハイライト
    const isHighMatch = (status.stage === customer.prefer) && flavorMatched;
    const matchBadge = isHighMatch ? '<span class="match-badge">★ 推奨</span>' : '';
    const rowClass = isHighMatch ? 'match-flavor' : '';
    const flavorChips = effFlavors.map(f => `<span class="flavor-chip flavor-${f}">${f}</span>`).join(' ');

    html += `
      <div class="sell-row ${rowClass}">
        ${spriteCanvas(veg.sprite)}
        <div class="item-info">
          <div class="item-name">${veg.name}の${status.label} <span class="small" style="color:var(--green-dark);">(${b.age}日漬)</span>${matchBadge}</div>
          <div class="item-detail">${flavorChips} ¥${price} · <span class="${preferClass}">${preferMark}</span> · <span class="${flavorClass}">${flavorMark}</span> · <span class="${priceClass}">${priceMark}</span></div>
        </div>
        <button class="primary" onclick="offerItem(${i})">薦める</button>
      </div>
    `;
  });

  if (!anyShown && game.dishes.length === 0) {
    html += `<div class="card center small">店頭に出した商品がありません</div>`;
  }

  // 加工品の表示(店頭出ししている分のみ)
  const displayDishes = game.dishes.filter(d => d.display);
  if (displayDishes.length > 0) {
    html += `<div class="card-title" style="margin-top:6px;">🍱 加工品</div>`;
    game.dishes.forEach((d, di) => {
      if (!d.display) return;
      const dishFlavorMatch = d.flavor && customer.flavorPrefer && d.flavor === customer.flavorPrefer;
      const flavorChip = d.flavor ? `<span class="flavor-chip flavor-${d.flavor}">${d.flavor}</span>` : '';
      const matchBadge = dishFlavorMatch ? '<span class="match-badge">★ 推奨</span>' : '';
      const rowClass = dishFlavorMatch ? 'match-flavor' : '';
      html += `
        <div class="sell-row ${rowClass}">
          <div style="font-size:24px;width:32px;text-align:center;">${d.icon}</div>
          <div class="item-info">

window.offerDish = function(dishIdx) {
  const dish = game.dishes[dishIdx];
  if (!dish) return;
  const customer = sellState.currentCustomer;

  // 味マッチ判定: 加工品の味が客の好みと一致すると買われやすい
  const flavorMatch = dish.flavor && customer.flavorPrefer && dish.flavor === customer.flavorPrefer;

  // 価格の許容(加工品は割高だが、味が合えば許容度が上がる)
  let willBuy;
  let response;
  if (flavorMatch) {
    // 好みの味なら高くても買う
    willBuy = true;
    response = `「これ、${dish.flavor}で好みなの!いただくわ」`;
  } else if (customer.priceTolerance >= 0.9 || dish.price <= 400) {
    // 予算に余裕がある客 or 安めなら買う
    willBuy = true;
    response = '「これ気になってたの、いただくわ」';
  } else {
    willBuy = false;
    response = '「うーん、今日はやめておくよ」';
  }

  if (willBuy) {
    game.money += dish.price;
    sellState.revenueToday += dish.price;
    game.weekRevenue += dish.price;
    game.weekSold++;
    sellState.soldToday.push({ veg: dish.name, status: '加工品', price: dish.price });
    game.dishes.splice(dishIdx, 1);
    game.totalSold++;
    game.totalRevenue += dish.price;
    addLog(`${customer.name}が${dish.name}を¥${dish.price}で購入${flavorMatch ? '(味◎)' : ''}`, '');
    game.reputation = Math.min(100, game.reputation + (flavorMatch ? 3 : 2));
    showModal('🛒 お買い上げ',
      `<div class="center">
        <canvas data-sprite="${customer.sprite}" style="width:64px;height:64px;image-rendering:pixelated;"></canvas>
        <p style="margin:8px 0;">${response}</p>
        <p style="color:#8b2828;font-size:13px;">¥${dish.price} 受け取り!${flavorMatch ? ' ★味が好み' : ''}</p>
      </div>`,
      [{ label: '次のお客へ ▶', action: () => { closeModal(); nextCustomer(); } }]
    );
  } else {
    addLog(`${customer.name}は${dish.name}を断った`, 'bad');
    showModal('👋 残念',
      `<div class="center">
        <canvas data-sprite="${customer.sprite}" style="width:64px;height:64px;image-rendering:pixelated;"></canvas>
        <p style="margin:8px 0;">${response}</p>
      </div>`,
      [{ label: '次のお客へ ▶', action: () => { closeModal(); nextCustomer(); } }]
    );
  }
};

window.offerItem = function(idx) {
  const barrel = game.barrels[idx];
  const veg = VEGETABLES.find(v => v.id === barrel.vegId);
  const status = getBarrelStatus(barrel);
  const basePrice = sellState.prices[idx];
  const mult = getPriceMultiplier(status.stage, veg.id); // 看板娘+レシピボーナス込み
  const price = Math.round(basePrice * mult);
  const customer = sellState.currentCustomer;
  const cost = getCurrentCost(veg);

  // 購入判定 (ボーナス込み価格で判定)
  let likeMult = 0.7;
  if (status.stage === customer.prefer) likeMult = 1.4;
  else if (status.stage === 'good') likeMult = 1.0;

  // 味マッチング: 客の好みの味が漬物の属性にあれば+0.3(熟成変化を考慮)
  const effFlavors = getEffectiveFlavors(barrel);
  const flavorMatch = customer.flavorPrefer && effFlavors.includes(customer.flavorPrefer);
  if (flavorMatch) likeMult += 0.3;

  const fairPrice = cost * 1.8;
  const priceRatio = basePrice / fairPrice;
  const acceptMax = customer.maxPrice;

  let willBuy = false;
  let response = '';

  if (priceRatio <= acceptMax && likeMult >= 1.0) {
    willBuy = true;
    if (likeMult >= 1.5) response = 'これこれ!まさにこういうのが欲しかったんだ。' + (flavorMatch ? `味も${customer.flavorPrefer}で完璧!` : '');
    else if (likeMult >= 1.3) response = 'これは良いね、いただきます。';
    else response = 'いいねぇ、これもらおうか。';
  } else if (priceRatio <= acceptMax * 0.8 && likeMult >= 0.7) {
    willBuy = true;
    response = 'うーん、まぁこの値段なら...';
  } else if (priceRatio > acceptMax) {
    response = 'ちょっと高いねぇ...また今度にするわ。';
  } else if (likeMult < 1.0) {
    if (customer.flavorPrefer && !flavorMatch) {
      response = `うーん、${customer.flavorPrefer}なのが欲しいんだけど...`;
    } else {
      response = 'うーん、ちょっと違うんだよなぁ...';
    }
  } else {
    response = '今日はやめておくよ。';
  }

  let newRecipes = [];
  if (willBuy) {
    game.money += price;
    sellState.revenueToday += price;
    game.weekRevenue += price;
    game.weekSold++;
    sellState.soldToday.push({ veg: veg.name, status: status.label, price });
    game.barrels[idx] = null;
    game.totalSold++;
    game.totalRevenue += price;
    // 統計更新(レシピ発見条件用)
    if (status.stage === 'asa') game.stats.soldAsa++;
    else if (status.stage === 'good') game.stats.soldGood++;
    else if (status.stage === 'furu') game.stats.soldFuru++;

    addLog(`${customer.name}が${veg.name}(${status.label})を¥${price}で購入`, '');

    // 評判
    let repChange = 1;
    if (likeMult >= 1.3 && priceRatio <= 1.0) repChange = 3;
    else if (likeMult >= 1.3) repChange = 2;
    else if (priceRatio > 1.2) repChange = 0;
    game.reputation = Math.min(100, game.reputation + repChange);

    // レシピ発見判定
    newRecipes = checkRecipeUnlock();
  } else {
    addLog(`${customer.name}: ${response}`, 'bad');
    game.reputation = Math.max(0, game.reputation - 1);
  }

  // 客の反応をモーダルで
  const onContinue = () => {
    closeModal();
    if (newRecipes.length > 0) {
      showRecipeUnlockModal(newRecipes, () => nextCustomer());
    } else {
      nextCustomer();
    }
  };

  showModal(
    willBuy ? '🛒 お買い上げ' : '👋 残念',
    `<div class="center">
      <canvas data-sprite="${customer.sprite}" style="width:64px;height:64px;image-rendering:pixelated;"></canvas>
      <p style="margin:8px 0;">「${response}」</p>
      ${willBuy ? `<p style="color:#8b2828;font-size:13px;">¥${price} 受け取り!${mult > 1.0 ? '<br><span style="font-size:10px;color:#5a7a3a;">(ボーナス +' + Math.round((mult-1)*100) + '%)</span>' : ''}</p>` : ''}
    </div>`,
    [{ label: '次のお客へ ▶', action: onContinue }]
  );
};

function showRecipeUnlockModal(recipes, onClose) {

    '💡 ひらめいた!',
    `<div class="center">
      <p style="font-size:11px;color:#5a7a3a;margin:4px 0;">${isDish ? '料理レシピ' : '漬物のコツ'}を会得!</p>
