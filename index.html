window.nextDay = function() {
  // 樽の経過日数を進める
  game.barrels.forEach(b => {
    if (b) b.age++;
  });

  // 評判は少しずつ50に戻る(慣性)
  if (game.reputation > 50) game.reputation = Math.max(50, game.reputation - 1);
  else if (game.reputation < 50) game.reputation = Math.min(50, game.reputation + 1);

  game.day++;
  game.daysInSeason++;
  game.weekDay++;
  if (game.daysInSeason >= SEASON_LENGTH) {
    game.daysInSeason = 0;
    game.season = SEASONS[(SEASONS.indexOf(game.season) + 1) % 4];
    if (!game.seasonsVisited.includes(game.season)) {
      game.seasonsVisited.push(game.season);
    }
    addLog(`季節が${game.season}になった`);
  }

  dailyResult = null;

  // 1年経過判定(4週=28日でちょうど一周)
  // 第4週終了時(day=28を超える時)に「一年エンディング」を出す
  // ただし「まだ続ける」を選択済みなら出さない
  if (game.day > 28 && !game.extendedPlay) {
    goToPhase('yearend');
    return;
  }

  // 週末判定
  if (game.weekDay > WEEK_LENGTH) {
    goToPhase('weekend');
    return;
  }

  goToPhase('morning');
};

window.continueAfterYear = function() {

  addLog(`一年経過。まだ続ける。`);
  saveGame();
  goToPhase('morning');
};

window.advanceToNextChapter = function() {
  // 看板娘の追加チェック
  const nextChapter = game.chapter + 1;
  const newGirl = GIRLS.find(g => g.unlockChapter === nextChapter && !game.girls.includes(g.id));

  // 週リセット
  game.chapter = nextChapter;
  game.weekDay = 1;
  game.weekRevenue = 0;
  game.weekSold = 0;
  clearWeeklyBonus();  // 先週のイベントボーナスをクリア

  // 表示の流れ: 看板娘加入 → ストーリーイベント → 報酬選択 → 開始
  const proceed = () => {
    // ストーリーイベントチェック(対象の看板娘がいる、章が一致、未表示)
    const event = EVENTS.find(e =>
      e.chapter === nextChapter &&
      !game.seenEvents.includes(e.id) &&
      game.girls.includes(e.girlId)
    );
    if (event) {
      showStoryEvent(event, () => {
        if (newGirl) {
          // 看板娘加入週はストーリー後すぐ朝へ
          saveGame();
          goToPhase('morning');
        } else {
          showRewardChoice();
        }
      });
    } else {
      if (newGirl) {
        saveGame();
        goToPhase('morning');
      } else {
        showRewardChoice();
      }
    }
  };

  if (newGirl) {
    // 看板娘加入週は娘がメイン報酬→ストーリー
    showGirlUnlockModal(newGirl, () => {
      game.girls.push(newGirl.id);
      game.girlJoinDay[newGirl.id] = game.day;
      addLog(`${newGirl.name}が仲間になった!`);
      proceed();
    });
  } else {
    proceed();
  }
};

// ストーリーイベントの表示
function showStoryEvent(event, onClose) {
  $('modal-header').textContent = event.title;
  const girl = GIRLS.find(g => g.id === event.girlId);
  $('modal-body').innerHTML = `
    <div class="story-event">
      <img class="story-event-img" src="${girl.illustImg}" alt="${girl.name}" data-sprite="${girl.sprite}" onerror="imgFallbackToSprite(this)">
      <div class="story-event-body">${event.body}</div>
      <div class="story-event-effect">${event.effect}</div>
      <div class="story-event-closing">${event.closingLine}</div>
    </div>
  `;
  $('modal-buttons').innerHTML = '';
  const btn = document.createElement('button');
  btn.textContent = '▶ 続ける';
  btn.className = 'primary';
  btn.onclick = () => {
    closeModal();
    game.seenEvents.push(event.id);
    applyEventBonus(event);
    addLog(`【物語】${event.title}`);
    saveGame();
    onClose();
  };
  $('modal-buttons').appendChild(btn);
  $('modal').classList.remove('hidden');
  renderSprites($('modal-body'));
}

function showRewardChoice() {
  $('modal-header').textContent = '🎁 章クリア報酬';

  // 利用可能な選択肢を生成(樽は上限あり)
  const choices = [];

  if (game.barrelCount < MAX_BARRELS) {
    choices.push({
      id: 'barrel',
      icon: '🛢',
      title: '樽を1つ増設',
      desc: `${game.barrelCount}個 → ${game.barrelCount + 1}個に。<br>一度に多く仕入れられる。`,
      action: () => {
        game.barrelCount++;
        game.barrels.push(null);
        addLog(`樽が${game.barrelCount}個になった`);
      },
    });
  }

  choices.push({
    id: 'money',
    icon: '💰',
    title: 'お祝い金',
    desc: `所持金が¥${(2000 + game.chapter * 500).toLocaleString()}増える。`,
    action: () => {
      const amount = 2000 + game.chapter * 500;
      game.money += amount;
      addLog(`お祝い金 ¥${amount.toLocaleString()}`);
    },
  });

  choices.push({
    id: 'reputation',
    icon: '⭐',
    title: '評判アップ',
    desc: `店の評判が大きく上がる(+20)。<br>お客が増えます。`,
    action: () => {
      game.reputation = Math.min(100, game.reputation + 20);
      addLog(`評判が上がった!`);
    },
  });

  choices.push({
    id: 'promotion',
    icon: '📣',
    title: '看板娘の宣伝',
    desc: `来週限定で1日の客が+2人。<br>立て直しに最適。`,
    action: () => {
      weeklyBonus.customerBonus += 2;
      addLog(`看板娘たちが街で宣伝!来週は客足UP`);
    },
  });

  let html = `<div style="text-align:center;font-size:11px;margin-bottom:10px;">第${game.chapter}週開幕!<br>お好きな報酬をひとつ選んでください</div>`;
  choices.forEach((c, i) => {
    html += `
      <div class="reward-card" onclick="pickReward(${i})">
        <span class="reward-icon">${c.icon}</span>
        <div style="flex:1;">
          <div class="reward-title">${c.title}</div>
          <div class="reward-desc">${c.desc}</div>
        </div>
      </div>
    `;
  });

  $('modal-body').innerHTML = html;
  $('modal-buttons').innerHTML = '';
  $('modal').classList.remove('hidden');

  // 選択肢のクロージャを window に登録
  window.pickReward = function(idx) {
    choices[idx].action();
    saveGame();
    closeModal();
    goToPhase('morning');
  };
}

function getEnding() {
  if (game.chapter >= 8) return '★名店として地域に語り継がれた...';
  if (game.chapter >= 4) return '★繁盛店として知られた漬物屋でした。';
  if (game.chapter >= 2) return '★ささやかに愛された街の漬物屋。';
  return '★夢半ばで閉店...また挑戦しましょう。';
}

// ============================================================
// マルチエンディング (任意引退で発生)
// ============================================================
function showEnding(endingType) {
  // endingType: 'retire' (任意引退) or 'yearend' (1年経過)
  endingType = endingType || 'retire';
  // ルート判定
  const route = decideEndingRoute();
  // ランキングに登録(retire/yearendどちらも記録)
  const rank = recordCurrentGame(route.name);

  const subtitle = endingType === 'yearend'
    ? '一年が経ち、店も少しずつ大きくなりました'
    : `第${game.chapter}週で店を譲りました`;

  $('modal-header').textContent = endingType === 'yearend' ? '🎍 一年経ちました' : '〜 終章 〜';
  $('modal-body').innerHTML = `
    <div class="ending-screen">
      <div class="ending-title">${route.title}</div>
      <div class="ending-subtitle">${subtitle}</div>

      <div class="ending-body">${route.body}</div>

      <div class="ending-stats">
        <div class="result-grid">
          <span class="label">最終所持金</span><span class="value gold">¥${game.money.toLocaleString()}</span>
          <span class="label">総売上</span><span class="value">¥${game.totalRevenue.toLocaleString()}</span>
          <span class="label">総販売数</span><span class="value">${game.totalSold}個</span>
          <span class="label">仲間</span><span class="value">${game.girls.length}人</span>
          <span class="label">レシピ</span><span class="value">${game.recipes.length}冊</span>
          <span class="label">物語</span><span class="value">${game.seenEvents.length}/3 章</span>
          <span class="label">最終評判</span><span class="value">${game.reputation}/100</span>
        </div>
      </div>

      <div class="ending-quote">${route.quote}</div>

      <div class="ending-route-label">エンディング: ${route.name}</div>
      ${rank > 0 ? `<div class="ranking-result">🏆 歴代ランキング第${rank}位!</div>` : ''}
    </div>
  `;
  $('modal-buttons').innerHTML = '';

  if (endingType === 'yearend') {
    // 1年エンディングは続けて遊べる
    const continueBtn = document.createElement('button');
    continueBtn.textContent = '▶ まだ続ける';
    continueBtn.className = 'primary';
    continueBtn.onclick = () => {
      closeModal();
      game.extendedPlay = true;
      saveGame();
      goToPhase('morning');
    };
    $('modal-buttons').appendChild(continueBtn);

    const newBtn = document.createElement('button');
    newBtn.textContent = '🌸 新しい店を始める';
    newBtn.onclick = () => {
      deleteSave();
      closeModal();
      location.reload();
    };
    $('modal-buttons').appendChild(newBtn);
  } else {
    // 任意引退は通常通り終了
    deleteSave();
    const btn = document.createElement('button');
    btn.textContent = '🌸 新しい店を始める';
    btn.className = 'primary';
    btn.onclick = () => {
      closeModal();
      location.reload();
    };
    $('modal-buttons').appendChild(btn);
  }
  $('modal').classList.remove('hidden');
}

function decideEndingRoute() {
  const totalRev = game.totalRevenue;
  const rep = game.reputation;

  // 名店ルート: 総売上が高い (¥30,000以上)
  if (totalRev >= 30000) {
    return {
      name: '名店',
      title: '🏯 名店「' + game.shopName + '」',
      body: `あなたが任された小さな漬物屋は、椿町随一の名店となった。<br><br>
朝から夕まで客足の絶えぬ店先、樽を並べる蔵には選び抜かれた品々。<br>
あなたの目利きと商才は、街中に知れ渡った。<br><br>
ある秋の夕暮れ、黒井さんが煙管を片手に、ぽつりと言った。<br>
「あなたなら、もう一人でやっていけますね」<br><br>
看板娘たちは、それぞれが立派な女将となり、自分の道を歩み始めた。<br>
あなたが任された店は、今も椿町の人々に愛されている。`,
      quote: '── 漬物は嘘をつかない。それを覚えておいてください。',
    };
  }

  // 円満ルート: 評判が高い (75以上)
  if (rep >= 75) {
    return {
      name: '円満',
      title: '🌸 街に愛された店',
      body: `大きな商家にはならなかったけれど、街の人々に深く愛された店。<br><br>
おばあちゃん、サラリーマン、子供、若奥さん。<br>
誰もがあなたの店を「うちの漬物屋」と呼んでくれた。<br><br>
看板娘たちは、年に一度、椿町に集まる約束を交わした。<br>
お梅は実家のある桜沢村から、お菊は深川から、お雪は横浜から。<br>
皆、それぞれの土地で、新しい人生を歩んでいる。<br><br>
あなたは小さな縁側に座って、夕日を眺めている。`,
      quote: '── ささやかでも、人の心に残る店であった。',
    };
  }

  // 物語ルート: イベントを多く見た (2つ以上)
  if (game.seenEvents.length >= 2) {
    return {
      name: '物語',
      title: '📖 三人の娘たち',
      body: `店は小さなままだったけれど、ここで多くの物語が育った。<br><br>
お梅は実家の妹の病が癒え、村に戻って漬物屋を継いだ。<br>
お菊は深川で父の店「菊屋」を再興する道を歩み始めた。<br>
お雪は横浜で、自分の足で立つ新しい人生を見つけた。<br><br>
三人とも、この小さな漬物屋で過ごした日々を、生涯の宝物だと言った。<br><br>
黒井さんはある日、煙管だけを残して、ふらりと旅に出てしまった。<br>
店を任されたあなたも、いつかどこかへ歩き出すのだろう。`,
      quote: '── 人も漬物も、時間で味が出る。',
    };
  }

  // 静かな別れ: それ以外
  return {
    name: '静かな別れ',
    title: '🍂 静かな別れ',
    body: `特別大きな店にはならなかった。<br>
けれど、ここで過ごした日々は確かに、誰かの思い出になった。<br><br>
看板娘たちは、それぞれの道を見つけて店を去った。<br>
あなたも、漬物樽に布をかけて、店じまいを決めた。<br><br>
黒井さんは何も言わず、ただ深く頭を下げた。<br>
「またどこかで、漬物の話でもしましょう」<br><br>
店の戸を閉める音が、夕暮れの町に響いた。`,
    quote: '── すべての商売には、終わりがある。それが商人の姿だ。',
  };
}

window.goToPhase = function(phase) {
  // 季節・看板娘条件のレシピをここでもチェック
  const newRecipes = checkRecipeUnlock();
  if (newRecipes.length > 0) {
    // モーダルで通知してから遷移
    showRecipeUnlockModal(newRecipes, () => {
      currentPhase = phase;
      renderPhase();
      $('main-area').scrollTop = 0;
    });
    return;
  }
  currentPhase = phase;
  renderPhase();
  $('main-area').scrollTop = 0;
};

// モーダル
// ============================================================
function showModal(title, bodyHtml, buttons) {
  $('modal-header').textContent = title;
  $('modal-body').innerHTML = bodyHtml;
  $('modal-buttons').innerHTML = '';
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.textContent = b.label;
    btn.className = 'primary';
    btn.onclick = b.action;
    $('modal-buttons').appendChild(btn);
  });
  $('modal').classList.remove('hidden');
  renderSprites($('modal-body'));
}

function closeModal() {
  $('modal').classList.add('hidden');
}

// 初期化
// ============================================================
function resetGame() {
  game.day = 1;
  game.weekDay = 1;
  game.chapter = 1;
  game.season = '春';
  game.money = 3000;
  game.reputation = 50;
  game.barrelCount = 6;
  game.barrels = Array(6).fill(null);
  game.log = [];
  game.daysInSeason = 0;
  game.totalSold = 0;
  game.totalRevenue = 0;
  game.weekRevenue = 0;
  game.weekSold = 0;
  game.girls = [];
  game.recipes = [];
  game.stats = { soldAsa: 0, soldGood: 0, soldFuru: 0 };
  game.seasonsVisited = ['春'];
  game.girlJoinDay = {};
  game.seenEvents = [];
  game.dishes = [];
  game.dishSlots = 8;
  game.extendedPlay = false;
  clearWeeklyBonus();
  dailyResult = null;
  sellState = null;
  buyQueue = [];
  addLog('開店!お梅と一緒に頑張ろう');

  // 最初の看板娘お梅をアンロック演出付きで登場
  const firstGirl = GIRLS.find(g => g.unlockChapter === 1);
  if (firstGirl) {
    showGirlUnlockModal(firstGirl, () => {
      game.girls.push(firstGirl.id);
      game.girlJoinDay[firstGirl.id] = game.day;
      goToPhase('morning');
    });
  } else {
    goToPhase('morning');
  }
}

function showTitle() {
  // タイトル画面表示時はヘッダーのタイトル戻り/引退ボタンを隠す
  const homeBtn = $('header-home-btn');
  const retireBtn = $('header-retire-btn');
  if (homeBtn) homeBtn.classList.add('hidden');
  if (retireBtn) retireBtn.classList.add('hidden');

  // タイトル画面のドット絵を描画
  drawSprite($('title-spr-1'), 'cucumber');
  drawSprite($('title-spr-2'), 'daikon');
  drawSprite($('title-spr-3'), 'nasu');

  // OSINTオーナーのフレーバー
  $('title-author').innerHTML = `&gt; powered by O.S.I.N.T.<br>~ Open Source Intelligence Network for Tsukemono ~`;

  // セーブ有無で続きからUIを表示
  const saveData = loadGame();
  if (saveData && saveData.game) {
    const s = saveData.game;
    $('continue-area').classList.remove('hidden');
    const savedAt = saveData.savedAt ? new Date(saveData.savedAt) : null;
    let timeStr = '';
    if (savedAt) {
      const m = String(savedAt.getMonth() + 1).padStart(2, '0');
      const d = String(savedAt.getDate()).padStart(2, '0');
      const h = String(savedAt.getHours()).padStart(2, '0');
      const mi = String(savedAt.getMinutes()).padStart(2, '0');
      timeStr = `最終セーブ: ${m}/${d} ${h}:${mi}`;
    }
    $('save-info').innerHTML = `
      <div style="color:var(--gold);font-size:11px;margin-top:4px;">${s.shopName || 'おしんこ漬物店'}</div>
      <div>第${s.chapter || 1}週 ${s.weekDay || 1}日目 / ¥${(s.money || 0).toLocaleString()} / 仲間${(s.girls || []).length}人</div>
      <div>${timeStr}</div>
    `;
    $('newgame-area').classList.add('has-save');
  } else {
    $('continue-area').classList.add('hidden');
  }

  // 続きから
  $('continue-btn').onclick = () => {
    const data = loadGame();
    if (!data) return;
    restoreFromSave(data);
    $('title-screen').style.display = 'none';
    addLog('続きから再開');
    goToPhase('morning');
  };

  // 新規開始
  $('start-btn').onclick = () => {
    if (hasSave()) {
      // 確認モーダル
      showModal(
        '⚠ 既存のセーブが消えます',
        '<div class="center"><p>新しく始めると、これまでの進行が消えます。<br>本当に始めますか?</p></div>',
        [
          { label: 'キャンセル', action: closeModal },
          { label: '始める', action: () => {
              deleteSave();
              closeModal();
              startNewGame();
            }
          },
        ]
      );
    } else {
      startNewGame();
    }
  };

  // Enterキーでも開始できるように
  $('shop-name-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') $('start-btn').click();
  });

  // 店主アイコンボタン
  $('owner-btn').onclick = showOwnerProfile;
  // ランキングボタン
  $('ranking-btn').onclick = showRanking;
}

}

window.showRecipeBook = function() {
  $('modal-header').textContent = '📖 おしんこ帳';
  let html = `<div class="recipe-list-modal">`;
  if (game.recipes.length === 0) {
    html += `<div class="center small" style="padding:20px;">まだレシピを習得していません</div>`;
  } else {
    // 種別ごとに分類して表示
    const pickleRecipes = game.recipes.filter(rid => {
      const r = RECIPES.find(x => x.id === rid);
      return r && r.type === 'pickle';
    });
    const dishRecipes = game.recipes.filter(rid => {
      const r = RECIPES.find(x => x.id === rid);
      return r && r.type === 'dish';
    });

    if (pickleRecipes.length > 0) {
      html += `<div class="recipe-section-title">🥒 漬物のコツ (${pickleRecipes.length})</div>`;
      pickleRecipes.forEach(rid => {
        const r = RECIPES.find(x => x.id === rid);
        html += `<div class="recipe-card unlocked">
          <span class="recipe-icon">${r.icon || '🥒'}</span>
          <div style="flex:1;">
            <div class="recipe-name">${r.name}</div>
            <div class="small">${r.desc}</div>
          </div>
        </div>`;
      });
    }

    if (dishRecipes.length > 0) {
      html += `<div class="recipe-section-title">🍱 料理レシピ (${dishRecipes.length})</div>`;
      dishRecipes.forEach(rid => {
        const r = RECIPES.find(x => x.id === rid);
        html += `<div class="recipe-card unlocked">
          <span class="recipe-icon">${r.icon || '🍱'}</span>
          <div style="flex:1;">
            <div class="recipe-name">${r.name}</div>
            <div class="small">${r.desc}</div>
          </div>
        </div>`;
      });
    }
  }
  html += `</div>`;
  $('modal-body').innerHTML = html;
  $('modal-buttons').innerHTML = '';
  const btn = document.createElement('button');
  btn.textContent = '▶ 閉じる';
  btn.className = 'primary';
  btn.onclick = closeModal;
  $('modal-buttons').appendChild(btn);
  $('modal').classList.remove('hidden');
};

function renderRankingList(ranking) {
  if (!ranking || ranking.length === 0) {
    return `<div class="center" style="padding:20px;">
      <p style="font-size:13px;">まだ記録がありません。</p>
      <p class="small" style="margin-top:8px;">店を引退すると、ここに記録が残ります。</p>
    </div>`;
  }
  let html = `<div class="ranking-list">`;
  ranking.forEach((e, i) => {
    const cls = i === 0 ? 'first' : i === 1 ? 'second' : i === 2 ? 'third' : '';
    const date = e.date ? new Date(e.date) : null;
    const dateStr = date ? `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()}` : '';
    html += `
      <div class="ranking-entry ${cls}">
        <span class="rank-num">${i + 1}</span>
        <div class="rank-info">
          <div class="shop">${e.shopName || '名無し漬物店'}</div>
          <div class="meta">第${e.chapter}週 / ${e.endingType || '?'} / ${dateStr}</div>
        </div>
        <div class="rank-revenue">¥${(e.totalRevenue||0).toLocaleString()}</div>
      </div>
    `;
  });
  html += `</div>`;
  return html;
}

function showRanking() {
  $('modal-header').textContent = '🏆 歴代ランキング';

  // オンライン未設定ならローカルのみ表示(従来通り)
  if (!ONLINE_RANKING_ENABLED()) {
    $('modal-body').innerHTML = renderRankingList(loadRanking());
    $('modal-buttons').innerHTML = '';
    const btn = document.createElement('button');
    btn.textContent = '▶ 閉じる';
    btn.className = 'primary';
    btn.onclick = closeModal;
    $('modal-buttons').appendChild(btn);
    $('modal').classList.remove('hidden');
    return;
  }

  // オンライン有効ならタブ切替UI
  const renderTabs = (active) => {
    $('modal-body').innerHTML = `
      <div class="ranking-tabs">
        <button class="ranking-tab ${active === 'local' ? 'active' : ''}" onclick="switchRankingTab('local')">📱 自分の記録</button>
        <button class="ranking-tab ${active === 'online' ? 'active' : ''}" onclick="switchRankingTab('online')">🌐 全国ランキング</button>
      </div>
      <div id="ranking-content"></div>
    `;
  };

  window.switchRankingTab = async function(tab) {
    renderTabs(tab);
    const content = document.getElementById('ranking-content');
    if (tab === 'local') {
      content.innerHTML = renderRankingList(loadRanking());
    } else {
      content.innerHTML = `<div class="center" style="padding:20px;"><p class="small">全国ランキングを読み込み中...</p></div>`;
      const online = await fetchOnlineRanking();
      if (online === null) {
        content.innerHTML = `<div class="center" style="padding:20px;"><p class="small" style="color:#8b2828;">読み込みに失敗しました。<br>通信環境を確認してください。</p></div>`;
      } else {
        content.innerHTML = renderRankingList(online);
      }
    }
  };

  renderTabs('local');
  document.getElementById('ranking-content').innerHTML = renderRankingList(loadRanking());

  $('modal-buttons').innerHTML = '';
  const btn = document.createElement('button');
  btn.textContent = '▶ 閉じる';
  btn.className = 'primary';
  btn.onclick = closeModal;
  $('modal-buttons').appendChild(btn);
  $('modal').classList.remove('hidden');
}

showTitle();
</script>
